<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-1 負數與數線 - 數位互動題庫</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

        :root {
            --bg-color: #0f172a; 
            --card-bg: #1e293b; 
            --surface-hover: #334155; 
            --accent-main: #22d3ee; 
            --accent-glow: rgba(34, 211, 238, 0.4);
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --border-color: #334155;
            --danger: #f43f5e;
            --success: #10b981;
            --warning: #f59e0b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* --- Header & Player Status --- */
        .top-bar {
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            position: relative;
            z-index: 20;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .title-group { display: flex; align-items: center; gap: 1rem; }
        
        /* 回大廳按鈕樣式 */
        .back-btn {
            background: var(--surface-hover); color: white; border: 1px solid var(--border-color);
            padding: 0.5rem 1rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s;
            text-decoration: none; display: flex; align-items: center; gap: 5px;
        }
        .back-btn:hover { background: var(--accent-main); color: #000; box-shadow: 0 0 10px var(--accent-glow); }

        .page-title {
            font-size: 1.5rem; font-weight: 900; color: var(--accent-main); letter-spacing: 2px; text-transform: uppercase;
        }

        .player-status {
            display: flex; align-items: center; gap: 1rem; background: rgba(15, 23, 42, 0.6);
            padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid var(--border-color);
        }

        .login-btn {
            background: var(--accent-main); color: #000; border: none; padding: 0.5rem 1rem;
            border-radius: 15px; font-weight: bold; cursor: pointer; transition: all 0.3s;
        }
        .login-btn:hover { background: var(--text-main); box-shadow: 0 0 10px var(--accent-glow); }

        .modal-btn { background: transparent; border: 1px solid var(--warning); color: var(--warning); padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: bold; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 0.5rem; }
        .modal-btn:hover { background: rgba(245, 158, 11, 0.1); box-shadow: 0 0 15px rgba(245, 158, 11, 0.4); }

        /* --- Main Layout & Sidebar --- */
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background-color: rgba(15, 23, 42, 0.95); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 1.5rem 1rem; gap: 0.75rem; overflow-y: auto; flex-shrink: 0; }
        .sidebar::-webkit-scrollbar { width: 6px; }
        .sidebar::-webkit-scrollbar-track { background: var(--bg-color); }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        .sidebar::-webkit-scrollbar-thumb:hover { background: var(--accent-main); }
        .sidebar-title { font-size: 1.1rem; font-weight: bold; color: var(--accent-main); margin-bottom: 0.5rem; text-align: center; letter-spacing: 1px; flex-shrink: 0; }
        .type-btn { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 0.75rem; padding: 1rem; text-align: left; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 0.5rem; flex-shrink: 0; min-height: max-content; }
        .type-btn::before { content: ''; position: absolute; left: 0; top: 0; width: 4px; height: 100%; background: transparent; transition: background 0.3s; }
        .type-btn:hover { border-color: var(--accent-main); background-color: var(--surface-hover); transform: translateY(-2px); }
        .type-btn.active { background: rgba(34, 211, 238, 0.05); border-color: var(--accent-main); box-shadow: inset 0 0 20px rgba(34, 211, 238, 0.1); }
        .type-btn.active::before { background: var(--accent-main); box-shadow: 0 0 10px var(--accent-main); }
        .type-title { font-size: 1.05rem; font-weight: 700; color: var(--text-main); }
        .type-meta { display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; justify-content: space-between; }
        .sub-label { font-size: 0.8rem; padding: 0.2rem 0.5rem; border-radius: 4px; background: rgba(148, 163, 184, 0.1); color: var(--text-muted); border: 1px solid var(--border-color); }
        .tag { font-size: 0.75rem; color: var(--accent-main); background: rgba(34, 211, 238, 0.1); padding: 0.1rem 0.4rem; border-radius: 4px; font-family: monospace; }

        /* --- Main Content Area --- */
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; position: relative; display: flex; flex-direction: column; align-items: center; }
        .timer-wrapper { position: absolute; top: 1rem; right: 2rem; z-index: 10; }
        #timer { font-family: monospace; font-size: 1.5rem; color: var(--accent-main); font-weight: 900; background: rgba(15, 23, 42, 0.8); padding: 0.25rem 0.75rem; border-radius: 0.5rem; border: 1px solid rgba(34, 211, 238, 0.5); transition: all 0.3s; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .timer-stopped { color: var(--text-muted) !important; border-color: var(--border-color) !important; box-shadow: none !important; }
        
        .question-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 1rem; padding: 2.5rem; width: 100%; max-width: 850px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); position: relative; margin-top: 1.5rem; }
        .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px dashed var(--border-color); }
        .q-badge { background: rgba(34, 211, 238, 0.1); color: var(--accent-main); padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.9rem; font-weight: 700; border: 1px solid rgba(34, 211, 238, 0.3); }
        .q-text { font-size: 1.25rem; line-height: 1.8; margin-bottom: 2rem; }

        .answer-area { background: rgba(15, 23, 42, 0.5); border: 2px dashed var(--accent-main); border-radius: 10px; padding: 1.5rem; text-align: center; margin-bottom: 1.5rem; transition: all 0.3s; }
        .answer-area.success-pulse { border-color: var(--success); box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }
        .answer-input { background: var(--bg-color); color: var(--accent-main); border: 1px solid var(--border-color); padding: 0.8rem; font-size: 1.5rem; border-radius: 8px; width: 150px; text-align: center; font-weight: bold; margin: 0 10px; }
        .answer-input:focus { outline: none; border-color: var(--accent-main); box-shadow: 0 0 10px var(--accent-glow); }
        
        .action-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .btn { padding: 1rem; border-radius: 0.75rem; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; border: none; display: flex; justify-content: center; align-items: center; gap: 0.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .btn:active { transform: scale(0.98); }
        .btn-hint { background: #475569; color: var(--text-main); }
        .btn-ans { background: var(--success); color: white; border: 1px solid #059669; }
        .btn-next-calc { background: #2563eb; color: white; border: 1px solid #60a5fa; }
        .btn-next-app { background: #9333ea; color: white; border: 1px solid #c084fc; }

        .hint-section, .answer-section { display: none; margin-top: 1.5rem; padding: 1.5rem; border-radius: 0.75rem; font-size: 1.1rem; }
        .hint-section { background: rgba(245, 158, 11, 0.05); border-left: 4px solid var(--warning); color: var(--text-muted); }
        .hint-section::before { content: '💡 解題思路：'; display: block; color: var(--warning); font-weight: bold; margin-bottom: 0.5rem; }
        .answer-section { background: rgba(16, 185, 129, 0.05); border-left: 4px solid var(--success); color: var(--success); font-weight: bold; font-size: 1.25rem; }
        .answer-section::before { content: '🎯 驗證結果：'; display: block; color: var(--success); font-weight: bold; margin-bottom: 0.5rem; font-size: 1.1rem;}
        
        i { font-family: 'Times New Roman', serif; font-style: italic; margin: 0 0.1rem; color: #bae6fd; font-weight: bold;}
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 100; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--card-bg); border: 2px solid var(--accent-main); border-radius: 1rem; padding: 2rem; max-width: 650px; width: 90%; position: relative; transform: translateY(-20px); transition: transform 0.3s; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-close { position: absolute; top: 1rem; right: 1.5rem; font-size: 1.5rem; color: var(--text-muted); cursor: pointer; }
        .core-rules ul { list-style: none; margin-top: 1rem; }
        .core-rules li { margin-bottom: 1rem; padding-left: 1.5rem; position: relative; line-height: 1.6; }
        .core-rules li::before { content: '⚡'; position: absolute; left: 0; color: var(--warning); }

        @media (max-width: 850px) {
            .container { flex-direction: column; overflow: auto; }
            .sidebar { width: 100%; max-height: 200px; flex-direction: row; flex-wrap: wrap; }
            .type-btn { width: calc(50% - 0.5rem); }
            .timer-wrapper { position: relative; top: 0; right: 0; width: 100%; text-align: right; margin-bottom: 1rem; }
            .action-group { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="title-group">
            <button class="back-btn" onclick="window.location.href='index.html'">🏠 回大廳</button>
            <div class="page-title">CH 1-1 負數與數線</div>
        </div>
        
        <div class="player-status">
            <div id="player-info" style="display: none; align-items: center; gap: 10px;">
                <span id="player-name" style="font-weight: bold; color: var(--accent-main);"></span>
                <span style="color: var(--warning);">💰 <span id="player-coins">0</span></span>
            </div>
            <button id="auth-btn" class="login-btn" style="display: none;" onclick="handleAuth()">登入系統</button>
        </div>

        <button class="modal-btn" onclick="toggleModal(true)">⚡ 破解核心心法</button>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-title">🌐 題型終端機</div>
            <div class="type-btn active" onclick="selectType(1, this)">
                <div class="type-title">題型一：相反意義的量(一)</div>
                <div class="type-meta"><span class="sub-label">正負符號與平均基準</span><span class="tag">基礎</span></div>
            </div>
            <div class="type-btn" onclick="selectType(2, this)">
                <div class="type-title">題型二：相反意義的量(二)</div>
                <div class="type-meta"><span class="sub-label">正負符號與增減表徵</span><span class="tag">基礎</span></div>
            </div>
        </aside>

        <main class="main-content">
            <div class="timer-wrapper"><div id="timer">00:00</div></div>

            <div class="question-card">
                <div class="q-header"><span class="q-badge" id="modeBadge">基礎情境</span></div>
                
                <div class="q-text" id="qText"></div>
                
                <div class="answer-area" id="answer-area">
                    <label style="font-size: 1.2rem;">👉 你的答案：</label>
                    <input type="text" id="student-answer" class="answer-input" placeholder="輸入數字">
                    <button class="btn btn-ans" onclick="checkAnswer()" style="display: inline-block; padding: 0.8rem 1.5rem;">🔥 送出攻擊</button>
                    <div id="feedback-msg" style="margin-top: 15px; font-weight: bold; font-size: 1.2rem;"></div>
                </div>

                <div class="hint-section" id="hText"></div>
                <div class="answer-section" id="aText"></div>

                <div class="action-group">
                    <button class="btn btn-hint" onclick="showHint()">👁️ 掃描解題思路</button>
                    <button class="btn btn-next-calc" onclick="generateQuestion(false)">🔄 基礎情境 (換一題)</button>
                    <button class="btn btn-next-app" onclick="generateQuestion(true)">🚀 現代素養 (換一題)</button>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="coreModal" onclick="if(event.target===this) toggleModal(false)">
        <div class="modal-content">
            <span class="modal-close" onclick="toggleModal(false)">&times;</span>
            <h2 style="color: var(--accent-main); margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">⚡ 核心心法資料庫</h2>
            <div class="core-rules">
                <ul>
                    <li><strong style="color:var(--accent-main)">正負相對性：</strong>生活中的量具有相對性。若規定一方為正(＋)，則另一方即為負(－)。</li>
                </ul>
            </div>
        </div>
    </div>

    <script type="module">
        // 【新增】匯入 onAuthStateChanged 來實現自動登入連動
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjcI122qYfHW9ibPLz-XG8kleDq4r2pF8",
            authDomain: "math-rpg-test.firebaseapp.com",
            projectId: "math-rpg-test",
            storageBucket: "math-rpg-test.firebasestorage.app",
            messagingSenderId: "593199481365",
            appId: "1:593199481365:web:7ad8656ff4aef6d0ca841c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        let currentType = 1;
        let isCurrentApp = false;
        let timerInterval; 
        let seconds = 0;
        
        let currentUserUID = null;       
        let currentCorrectAnswer = "";   
        let hasAnsweredCorrectly = false; 

        // ==========================================
        // 【自動連動登入狀態】這就是讓兩邊金幣與帳號一致的魔法！
        // ==========================================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // 如果偵測到大廳已經登入，自動載入資料
                currentUserUID = user.uid;
                document.getElementById('auth-btn').style.display = 'none'; // 隱藏登入按鈕
                document.getElementById('player-info').style.display = 'flex'; // 顯示玩家資訊
                document.getElementById('player-name').innerText = user.displayName;

                // 即時去資料庫抓最新金幣
                const userDocRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userDocRef);
                if (docSnap.exists()) {
                    document.getElementById('player-coins').innerText = docSnap.data().coins;
                }
            } else {
                // 若未登入（例如有人直接貼網址進來），才顯示登入按鈕
                currentUserUID = null;
                document.getElementById('auth-btn').style.display = 'block';
                document.getElementById('player-info').style.display = 'none';
            }
        });

        // 手動登入功能 (預防萬一)
        window.handleAuth = function() {
            signInWithPopup(auth, provider).catch(error => alert("登入失敗：" + error.message));
        };

        // ==========================================
        // 批改與金幣發放邏輯
        // ==========================================
        window.checkAnswer = async function() {
            if (hasAnsweredCorrectly) return; 

            let studentInput = document.getElementById('student-answer').value.trim();
            let feedbackEl = document.getElementById('feedback-msg');
            let answerAreaEl = document.getElementById('answer-area');

            if (studentInput === "") {
                feedbackEl.innerText = "⚠️ 勇者，請輸入數字發動攻擊！";
                feedbackEl.style.color = "var(--warning)";
                return;
            }

            if (studentInput === currentCorrectAnswer || studentInput === "+" + currentCorrectAnswer) {
                hasAnsweredCorrectly = true;
                stopTimer();
                document.getElementById('aText').style.display = 'block'; 
                answerAreaEl.classList.add('success-pulse'); 
                
                if (currentUserUID) {
                    feedbackEl.innerHTML = "🎉 攻擊成功！獲得 <span style='color:gold;'>💰 10 枚金幣</span>！";
                    feedbackEl.style.color = "var(--success)";
                    
                    const userRef = doc(db, "users", currentUserUID);
                    await updateDoc(userRef, { coins: increment(10), exp: increment(50) });
                    
                    let currentCoins = parseInt(document.getElementById('player-coins').innerText);
                    document.getElementById('player-coins').innerText = currentCoins + 10;
                } else {
                    feedbackEl.innerText = "🎉 攻擊成功！(提示：請先登入才能將金幣存入背包喔！)";
                    feedbackEl.style.color = "var(--success)";
                }
            } else {
                feedbackEl.innerText = "❌ 攻擊無效！被護盾擋下了，請檢查正負號或查看解題思路！";
                feedbackEl.style.color = "var(--danger)";
            }
        };

        // ==========================================
        // 題目產生與UI控制
        // ==========================================
        function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function formatTimer(sec) {
            let m = Math.floor(sec / 60).toString().padStart(2, '0');
            let s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startTimer() {
            clearInterval(timerInterval);
            seconds = 0;
            const el = document.getElementById('timer');
            el.innerText = "00:00";
            el.classList.remove('timer-stopped');
            timerInterval = setInterval(() => { seconds++; el.innerText = formatTimer(seconds); }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
            document.getElementById('timer').classList.add('timer-stopped');
        }

        window.selectType = function(type, element) {
            document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            currentType = type;
            window.generateQuestion(false);
        };

        window.toggleModal = function(show) {
            const modal = document.getElementById('coreModal');
            if(show) modal.classList.add('active'); else modal.classList.remove('active');
        };

        window.showHint = function() { 
            document.getElementById('hText').style.display = 'block'; 
            document.getElementById('hText').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        };

        window.generateQuestion = function(isApp) {
            isCurrentApp = isApp;
            hasAnsweredCorrectly = false; 
            
            document.getElementById('hText').style.display = 'none';
            document.getElementById('aText').style.display = 'none';
            document.getElementById('student-answer').value = '';
            document.getElementById('feedback-msg').innerText = '';
            document.getElementById('answer-area').classList.remove('success-pulse');
            
            const badge = document.getElementById('modeBadge');
            if (isApp) { badge.innerText = '🚀 現代素養情境'; badge.style.color = '#e879f9'; badge.style.borderColor = 'rgba(217, 70, 239, 0.3)'; } 
            else { badge.innerText = '📝 課本標準情境'; badge.style.color = 'var(--accent-main)'; badge.style.borderColor = 'rgba(34, 211, 238, 0.3)'; }

            let qHTML = '', hHTML = '', aHTML = '';

            switch(currentType) {
                case 1: 
                    {
                        let base = rand(60, 85);
                        let pDiff = rand(3, 15);
                        let nDiffBase = rand(2, 12);
                        let nDiff = -nDiffBase;
                        
                        if (!isApp) {
                            qHTML = `某次數學平時測驗以全班平均分數 <i>${base}</i> 分為基準。若小妍考了 <i>${base + pDiff}</i> 分，記為 <i>+${pDiff}</i> 分；那麼小翊考了 <i>${base + nDiff}</i> 分，在紀錄表上應記為什麼數字？(請直接輸入數字包含正負號)`;
                            hHTML = `基準點設為 0。<br>比基準高記為正號 (＋)，比基準低則記為負號 (－)。<br>小翊的分數比平均少 <i>${nDiffBase}</i> 分。`;
                            aHTML = `應記為 <i>${nDiff}</i> 分`;
                        } else {
                            qHTML = `在星際物資運輸系統中，標準貨物艙的規定基準重量為 <i>${base}</i> 噸。系統感測器設定：重量超出基準 <i>${pDiff}</i> 噸時發送訊號 <i>+${pDiff}</i>。今日查核發現某貨物艙重量僅有 <i>${base + nDiff}</i> 噸，請問系統感測器會發送什麼數值的訊號？`;
                            hHTML = `以標準重量為基準(0)。超重為正，不足為負。<br>該貨艙比基準輕了 <i>${nDiffBase}</i> 噸，應以負數表示。`;
                            aHTML = `發送訊號 <i>${nDiff}</i>`;
                        }
                        currentCorrectAnswer = nDiff.toString();
                    }
                    break;
                default:
                    qHTML = "此題型尚在開發升級中...";
                    currentCorrectAnswer = "999";
                    break;
            }

            document.getElementById('qText').innerHTML = qHTML;
            document.getElementById('hText').innerHTML = hHTML;
            document.getElementById('aText').innerHTML = aHTML;
            startTimer();
        };

        window.onload = () => { window.generateQuestion(false); };
    </script>
</body>
</html>
