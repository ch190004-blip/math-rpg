<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CH 1-1 負數與數線 - 史萊姆原野</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #game-container { width: 100vw; height: 100vh; }
        
        /* 回大廳按鈕 (蓋在遊戲畫面上方) */
        .back-btn {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            background: rgba(15, 23, 42, 0.8); color: #22d3ee; border: 2px solid #22d3ee;
            padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none;
        }
        
        /* 戰鬥轉場黑幕 */
        .battle-transition {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: #000; z-index: 9999;
            opacity: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: #f43f5e; font-size: 2.5rem; font-weight: 900; text-shadow: 0 0 20px rgba(244, 63, 94, 0.8);
        }
        .battle-transition.active { opacity: 1; pointer-events: all; animation: encounterFlash 1.2s ease-in-out forwards; }
        @keyframes encounterFlash {
            0% { background-color: transparent; opacity: 0; transform: scale(1); }
            10% { background-color: white; opacity: 1; transform: scale(1.05); }
            20% { background-color: black; transform: scale(1); }
            30% { background-color: white; }
            40% { background-color: black; }
            100% { background-color: black; opacity: 1; }
        }

        /* 手機虛擬搖桿 (疊在遊戲畫面上) */
        .dpad-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: none; flex-direction: column; align-items: center; gap: 10px; z-index: 100; user-select: none;
        }
        .dpad-row { display: flex; gap: 15px; }
        .dpad-btn {
            width: 60px; height: 60px; background: rgba(15, 23, 42, 0.6); border: 2px solid #22d3ee; border-radius: 50%;
            font-size: 24px; color: #22d3ee; display: flex; justify-content: center; align-items: center;
            touch-action: none; -webkit-tap-highlight-color: transparent;
        }
        .dpad-btn.active { background: #22d3ee; color: #000; transform: scale(0.95); }
        @media (max-width: 850px) { .dpad-container { display: flex; } }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">🏠 撤退回大廳</a>
    <div id="game-container"></div>
    <div id="battle-transition" class="battle-transition"></div>

    <div class="dpad-container">
        <div class="dpad-btn" id="btn-up">⬆️</div>
        <div class="dpad-row">
            <div class="dpad-btn" id="btn-left">⬅️</div>
            <div class="dpad-btn" id="btn-down">⬇️</div>
            <div class="dpad-btn" id="btn-right">➡️</div>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            scale: {
                mode: Phaser.Scale.RESIZE, // 讓畫布自動填滿手機螢幕
                parent: 'game-container',
                width: '100%',
                height: '100%'
            },
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);

        let player;
        let slimes;
        let cursors;
        let keys;
        let isTransitioning = false;

        // 【1. 載入素材】
        function preload() {
            // 我們直接抓你 GitHub assets 資料夾裡的圖，如果找不到會破圖，請確保你有上傳！
            // 如果你想先用官方測試圖，可以把下面這兩行換成官方網址
            this.load.image('player', 'assets/player.png'); 
            this.load.image('slime', 'assets/slime.png');
            
            // 備用：如果你還沒傳圖片，請刪除上面兩行，解除下面兩行的註解來測試
            // this.load.image('player', 'https://labs.phaser.io/assets/sprites/spaceman.png');
            // this.load.image('slime', 'https://labs.phaser.io/assets/sprites/slime.png');
        }

        // 【2. 創造世界】
        function create() {
            // 設定原野的範圍 (2000x2000 超大地圖)
            this.physics.world.setBounds(0, 0, 2000, 2000);
            
            // 畫出地板網格 (用來感受移動)
            this.add.grid(1000, 1000, 2000, 2000, 50, 50, 0x064e3b, 1, 0x0f766e, 0.5);

            // 創造勇者
            player = this.physics.add.image(1000, 1000, 'player');
            player.setCollideWorldBounds(true);

            // 讓攝影機永遠跟著勇者！
            this.cameras.main.setBounds(0, 0, 2000, 2000);
            this.cameras.main.startFollow(player, true, 0.05, 0.05);

            // 隨機產生 15 隻史萊姆
            slimes = this.physics.add.group();
            for (let i = 0; i < 15; i++) {
                let x = Phaser.Math.Between(100, 1900);
                let y = Phaser.Math.Between(100, 1900);
                let slime = slimes.create(x, y, 'slime');
                
                slime.setCollideWorldBounds(true);
                slime.setBounce(1); // 撞到邊界會反彈
                // 給史萊姆隨機的移動速度 (Roaming AI)
                slime.setVelocity(Phaser.Math.Between(-100, 100), Phaser.Math.Between(-100, 100));
            }

            // 設定碰撞：勇者撞到史萊姆時，執行 hitEnemy
            this.physics.add.collider(player, slimes, hitEnemy, null, this);

            // 綁定鍵盤
            cursors = this.input.keyboard.createCursorKeys();
            keys = this.input.keyboard.addKeys('W,A,S,D');

            // 綁定虛擬搖桿
            setupVirtualJoystick();
        }

        // 【3. 遊戲迴圈】
        function update() {
            if (isTransitioning) return;

            player.setVelocity(0);
            const speed = 250;

            if (cursors.left.isDown || keys.A.isDown || virtualKeys.left) player.setVelocityX(-speed);
            else if (cursors.right.isDown || keys.D.isDown || virtualKeys.right) player.setVelocityX(speed);
            
            if (cursors.up.isDown || keys.W.isDown || virtualKeys.up) player.setVelocityY(-speed);
            else if (cursors.down.isDown || keys.S.isDown || virtualKeys.down) player.setVelocityY(speed);
        }

        // 【4. 戰鬥觸發邏輯】
        function hitEnemy(player, slime) {
            if (isTransitioning) return;
            isTransitioning = true;
            
            // 讓勇者跟史萊姆停下來
            player.setVelocity(0);
            slime.setVelocity(0);

            // 啟動轉場特效
            const transitionEl = document.getElementById('battle-transition');
            transitionEl.innerHTML = `<div>⚔️ 遭遇題型怪物！<br><span style="font-size: 1.8rem; color: #22d3ee;">進入戰鬥結界...</span></div>`;
            transitionEl.classList.add('active'); 
            
            // 1.2 秒後，跳轉到你的 1-1 戰鬥答題網頁！
            setTimeout(() => {
                window.location.href = '1-1-battle.html';
            }, 1200);
        }

        // --- 虛擬搖桿設定區 ---
        const virtualKeys = { up: false, down: false, left: false, right: false };
        function setupVirtualJoystick() {
            function bindBtn(btnId, keyName) {
                const btn = document.getElementById(btnId);
                const press = (e) => { e.preventDefault(); virtualKeys[keyName] = true; btn.classList.add('active'); };
                const release = (e) => { e.preventDefault(); virtualKeys[keyName] = false; btn.classList.remove('active'); };
                btn.addEventListener('touchstart', press, {passive: false});
                btn.addEventListener('mousedown', press);
                btn.addEventListener('touchend', release, {passive: false});
                btn.addEventListener('mouseup', release);
                btn.addEventListener('mouseleave', release);
            }
            bindBtn('btn-up', 'up'); bindBtn('btn-down', 'down');
            bindBtn('btn-left', 'left'); bindBtn('btn-right', 'right');
        }
    </script>
</body>
</html>
