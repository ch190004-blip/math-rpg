<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>1-1 負數與數線｜題型 3 戰鬥</title>
  <link rel="stylesheet" href="./styles/battle-ui.css">
</head>
<body>
  <div class="game-shell">
    <div class="game-shell-left">
      <button class="game-shell-btn" id="return-btn">🏕 回原野</button>
      <button class="game-shell-btn" id="tower-btn">🗼 七上之塔</button>
    </div>
    <div class="game-shell-right">
      <div class="battle-tag" id="battle-tag">戰鬥中</div>
    </div>
  </div>

  <header class="top-bar">
    <div class="page-title" id="page-title">CH 1-1 負數與數線</div>
    <div class="player-status">
      <div id="player-info" style="display:none; align-items:center; gap:10px;">
        <span class="name" id="player-name"></span>
        <span class="coins">💰 <span id="player-coins">0</span></span>
      </div>
      <button class="modal-btn" onclick="toggleModal(true)">⚡ 核心心法</button>
    </div>
  </header>

  <main class="wrapper">
    <section class="hero-panel">
      <div class="panel-top">
        <div>
          <div class="panel-badges">
            <span class="q-badge" id="modeBadge">📝 課本標準情境</span>
            <span class="monster-badge" id="monster-badge">題型</span>
          </div>
          <div class="reward-chip">🎁 答對立即獲得 10 金幣</div>
        </div>
        <div class="timer-wrapper">
          <div id="timer">00:00</div>
        </div>
      </div>

      <div class="question-title" id="type-title">題型載入中</div>
      <div class="q-text" id="qText"></div>
      <canvas id="mathCanvas" width="600" height="150"></canvas>

      <div class="mode-switch">
        <button class="mode-btn active" id="standard-btn">基礎情境（換一題）</button>
        <button class="mode-btn alt" id="app-btn">現代素養（換一題）</button>
      </div>

      <section class="answer-card">
        <div class="answer-grid" id="answer-grid"></div>
        <div class="answer-help" id="answer-help"></div>
        <div class="feedback-box" id="feedback-box"></div>

        <div class="action-row">
          <button class="btn btn-primary" id="submit-btn">⚔️ 送出答案</button>
          <button class="btn btn-hint" id="hint-btn">💡 看提示</button>
          <button class="btn btn-reroll" id="app-btn-dup" style="display:none;"></button>
          <button class="btn btn-leave" id="leave-btn">🏃 離開戰鬥</button>
        </div>

        <div class="hint-section" id="hText"></div>
        <div class="answer-section" id="aText"></div>
      </section>
    </section>
  </main>

  <div class="modal-overlay" id="coreModal" onclick="if(event.target===this) toggleModal(false)">
    <div class="modal-content">
      <span class="modal-close" onclick="toggleModal(false)">&times;</span>
      <h2 style="color: var(--accent-main); margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem;">⚡ 核心心法資料庫</h2>
      <div class="core-rules">
        <ul>
          <li><strong style="color:var(--accent-main)">正負相對性：</strong>先找基準，再判斷高於基準還是低於基準。</li>
          <li><strong style="color:var(--accent-main)">數線判讀：</strong>右邊的數比較大，兩點距離一定是非負值。</li>
          <li><strong style="color:var(--accent-main)">絕對值：</strong>代表到原點的距離，不會是負數。</li>
          <li><strong style="color:var(--accent-main)">相反數：</strong>符號相反、大小相同；和為 0。</li>
          <li><strong style="color:var(--accent-main)">作答策略：</strong>先判規則，再計算；排序題與多解題要把所有答案寫完整。</li>
        </ul>
      </div>
    </div>
  </div>

  <script type="module">
    import { bootBattlePage } from "./js/ch1-1-battle-engine.js";
    bootBattlePage(3);
  </script>
</body>
</html>
