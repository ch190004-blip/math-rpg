<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#83da6a" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Math RPG｜1-1 原野</title>
  <link rel="stylesheet" href="./styles/game-ui.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body class="scene-page">
  <div id="game-root"></div>

  <div class="hud">
    <div class="hud-left">
      <div class="hud-chip"><div class="scene-tag" id="hud-scene">1-1 原野</div></div>
      <div class="hud-chip">
        <div class="player-meta">
          <div class="player-name" id="hud-name">勇者</div>
          <div class="player-stats"><span id="hud-level">Lv.1</span> · 💰 <span id="hud-coins">100</span></div>
        </div>
      </div>
    </div>
    <div class="hud-right">
      <div class="menu-anchor">
        <button class="menu-button" id="menu-btn">☰</button>
        <div class="menu-panel" id="menu-panel">
          <button id="menu-home">回七上之塔</button>
          <button id="menu-fullscreen">全螢幕</button>
          <button id="menu-logout">登出</button>
        </div>
      </div>
    </div>
  </div>

  <div class="action-pill" id="action-pill"></div>
  <div class="toast" id="toast"></div>

  <div class="controls">
    <div class="dpad">
      <button class="control-button up" data-key="up">▲</button>
      <button class="control-button left" data-key="left">◀</button>
      <button class="control-button right" data-key="right">▶</button>
      <button class="control-button down" data-key="down">▼</button>
    </div>
    <div class="right-buttons"><button class="control-button action" data-key="action">A</button></div>
  </div>

  <div class="scene-fade" id="scene-fade"></div>

  <script type="module">
    import { primeAuth, watchUser, signOutGoogle } from "./js/firebase-core.js";
    import {
      registerServiceWorker, getSceneState, saveSceneState, setBattleEntry, consumeBattleResult,
      transitionTo, showToast, updateHud, setupMenu, createControlState, bindControls, setActionHint
    } from "./js/app-shell.js";
    import { ensureSharedTextures, createTopdownWorld } from "./js/pixel-art.js";

    registerServiceWorker();
    await primeAuth();

    let userReady = false;
    watchUser((user, profile) => {
      userReady = true;
      if (!user) {
        showToast("請先登入", "warn", 1200);
        setTimeout(() => transitionTo("./index.html"), 500);
        return;
      }
      updateHud(profile, "1-1 原野");
    });

    setupMenu({
      onHome: () => transitionTo("./tower-seven-up.html"),
      onLogout: async () => { await signOutGoogle(); transitionTo("./index.html"); },
      homeLabel: "回七上之塔"
    });

    const battleResult = consumeBattleResult();
    if (battleResult && battleResult.scene === "chapter-1-1-field") {
      showToast(`勝利 +${battleResult.coins || 10} 金幣`, "success", 2200);
    }

    const controlState = bindControls(createControlState());

    class ChapterFieldScene extends Phaser.Scene {
      constructor() {
        super("ChapterFieldScene");
        this.lastAction = false;
        this.portalAction = null;
        this.battleLock = false;
      }

      create() {
        ensureSharedTextures(this);
        const worldWidth = 2800;
        const worldHeight = 1900;
        createTopdownWorld(this, worldWidth, worldHeight);
        this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
        this.cameras.main.setBackgroundColor("#8fd6ff");
        this.cameras.main.roundPixels = true;

        this.add.tileSprite(860, 1490, 640, 360, "water-tile").setAlpha(0.95);
        this.add.ellipse(860, 1490, 700, 390, 0x7bc7ff, 0.2);
        this.add.tileSprite(2200, 420, 460, 240, "water-tile").setAlpha(0.9);
        this.add.ellipse(2200, 420, 510, 280, 0x7bc7ff, 0.18);

        const path = this.add.graphics();
        path.fillStyle(0xe0c79d, 1);
        path.fillRoundedRect(180, 1080, 2360, 150, 38);
        path.fillRoundedRect(430, 760, 130, 630, 32);
        path.fillRoundedRect(420, 745, 360, 120, 28);
        path.fillRoundedRect(1760, 820, 130, 560, 32);
        path.fillRoundedRect(1760, 810, 640, 120, 28);
        path.fillRoundedRect(2300, 900, 120, 500, 28);

        this.obstacles = this.physics.add.staticGroup();
        const obstacleData = [
          [160, 260, "tree"], [340, 250, "tree"], [540, 250, "tree"], [760, 250, "tree"], [980, 270, "rock"],
          [2200, 260, "tree"], [2400, 260, "tree"], [2600, 280, "tree"],
          [2350, 1520, "tree"], [2140, 1580, "tree"], [1940, 1640, "tree"], [1700, 1510, "rock"],
          [360, 1640, "tree"], [520, 1710, "tree"], [680, 1630, "rock"], [1220, 1590, "tree"],
          [1480, 1610, "tree"], [1640, 300, "rock"], [1120, 340, "tree"], [1340, 320, "tree"]
        ];
        obstacleData.forEach(([x, y, key]) => {
          this.add.image(x, y, key).setDepth(y);
          const body = this.physics.add.staticImage(x, y + (key === "tree" ? 18 : 0), "rock").setVisible(false);
          body.body.setSize(key === "tree" ? 44 : 28, key === "tree" ? 20 : 16);
          body.refreshBody();
          this.obstacles.add(body);
        });

        for (let i = 0; i < 34; i += 1) {
          const flower = this.add.image(
            Phaser.Math.Between(100, worldWidth - 100),
            Phaser.Math.Between(100, worldHeight - 100),
            "flower"
          ).setScale(Phaser.Math.FloatBetween(0.85, 1.2));
          flower.setDepth(flower.y);
        }

        this.add.text(470, 660, "返回七上之塔", { fontFamily: "Noto Sans TC", fontSize: "24px", color: "#2149a5", fontStyle: "900" });
        this.add.image(470, 840, "portal").setScale(1.28).setDepth(840);
        this.portalZone = this.makeZone(470, 840, 190, 180);

        this.add.text(2100, 760, "題型史萊姆區", { fontFamily: "Noto Sans TC", fontSize: "24px", color: "#25506e", fontStyle: "900" }).setOrigin(0.5);

        const start = getSceneState("chapter-1-1-field", { x: 280, y: 1060 });
        this.player = this.physics.add.sprite(start.x, start.y, "hero-top-idle");
        this.player.setCollideWorldBounds(true);
        this.player.setSize(16, 14);
        this.player.setOffset(4, 14);
        this.physics.add.collider(this.player, this.obstacles);

        this.slimeDefinitions = [
          { key: "green", type: 1, short: "題型一", label: "題型一：相反意義的量(一)", page: "./battle-1-1-type1.html" },
          { key: "blue", type: 2, short: "題型二", label: "題型二：相反意義的量(二)", page: "./battle-1-1-type2.html" },
          { key: "pink", type: 3, short: "題型三", label: "題型三：數線坐標與距離", page: "./battle-1-1-type3.html" },
          { key: "gold", type: 4, short: "題型四", label: "題型四：數線與等分點", page: "./battle-1-1-type4.html" },
          { key: "purple", type: 5, short: "題型五", label: "題型五：數的大小比較(一)", page: "./battle-1-1-type5.html" },
          { key: "red", type: 6, short: "題型六", label: "題型六：數的大小比較(二)", page: "./battle-1-1-type6.html" },
          { key: "aqua", type: 7, short: "題型七", label: "題型七：相反數解碼", page: "./battle-1-1-type7.html" },
          { key: "orange", type: 8, short: "題型八", label: "題型八：絕對值運算範圍", page: "./battle-1-1-type8.html" },
          { key: "teal", type: 9, short: "題型九", label: "題型九：圖解絕對值距離", page: "./battle-1-1-type9.html" },
          { key: "silver", type: 10, short: "題型十", label: "題型十：綜合挑戰", page: "./battle-1-1-type10.html" }
        ];

        this.slimes = [];
        const spawnPoints = [
          [980, 1010], [1180, 850], [1340, 1170], [1520, 980], [1700, 720],
          [1880, 1130], [2060, 890], [2230, 1060], [2050, 1360], [1520, 620]
        ];

        spawnPoints.forEach((point, index) => {
          const base = this.slimeDefinitions[index];
          const slime = this.physics.add.sprite(point[0], point[1], `slime-${base.key}`);
          slime.setCircle(10, 4, 8);
          slime.setBounce(1, 1);
          slime.setCollideWorldBounds(true);
          slime.body.setVelocity(Phaser.Math.Between(-70, 70), Phaser.Math.Between(-70, 70));
          slime.setData("battle", { ...base });
          slime.setDepth(slime.y + 4);
          const tag = this.add.text(point[0], point[1] - 38, base.short, {
            fontFamily: "Noto Sans TC",
            fontSize: "18px",
            color: "#ffffff",
            backgroundColor: "rgba(37,67,111,0.55)",
            padding: { left: 8, right: 8, top: 4, bottom: 4 }
          }).setOrigin(0.5).setDepth(slime.y + 5);
          slime.setData("tag", tag);

          this.tweens.add({
            targets: slime,
            scaleY: 0.92,
            scaleX: 1.06,
            duration: Phaser.Math.Between(520, 820),
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut"
          });
          this.slimes.push(slime);
        });

        this.physics.add.collider(this.player, this.obstacles);
        this.physics.add.overlap(this.player, this.portalZone, () => {
          this.portalAction = () => {
            saveSceneState("chapter-1-1-field", { x: this.player.x, y: this.player.y });
            transitionTo("./tower-seven-up.html");
          };
        });
        this.slimes.forEach((slime) => this.physics.add.overlap(this.player, slime, () => this.startBattle(slime)));

        this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
        const zoom = Math.min(window.innerWidth / 520, window.innerHeight / 320);
        this.cameras.main.setZoom(Phaser.Math.Clamp(zoom, 1.3, 2.2));

        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys("W,A,S,D,E");
        this.time.addEvent({
          delay: 1300,
          loop: true,
          callback: () => {
            saveSceneState("chapter-1-1-field", { x: this.player.x, y: this.player.y });
            this.slimes.forEach((slime) => {
              if (!slime.active) return;
              slime.body.setVelocity(Phaser.Math.Between(-84, 84), Phaser.Math.Between(-84, 84));
            });
          }
        });
      }

      makeZone(x, y, w, h) {
        const zone = this.add.zone(x, y, w, h);
        this.physics.world.enable(zone);
        zone.body.setAllowGravity(false);
        zone.body.moves = false;
        return zone;
      }

      startBattle(slime) {
        if (this.battleLock) return;
        this.battleLock = true;
        const battle = slime.getData("battle");
        setBattleEntry({
          scene: "chapter-1-1-field",
          type: battle.type,
          label: battle.label,
          returnTo: "./chapter-1-1-field.html"
        });
        saveSceneState("chapter-1-1-field", { x: this.player.x, y: this.player.y });
        this.cameras.main.flash(220, 255, 255, 255);
        showToast(`遭遇 ${battle.label}`, "warn", 900);
        setTimeout(() => {
          transitionTo(`${battle.page}?battle=1&type=${battle.type}&returnTo=chapter-1-1-field.html&label=${encodeURIComponent(battle.label)}`);
        }, 260);
      }

      update() {
        if (!userReady) return;
        this.portalAction = null;
        this.physics.world.overlap(this.player, this.portalZone);
        setActionHint(this.portalAction ? "A 回七上之塔" : "");

        const speed = 176;
        const left = this.cursors.left.isDown || this.keys.A.isDown || controlState.left;
        const right = this.cursors.right.isDown || this.keys.D.isDown || controlState.right;
        const up = this.cursors.up.isDown || this.keys.W.isDown || controlState.up;
        const down = this.cursors.down.isDown || this.keys.S.isDown || controlState.down;

        this.player.body.setVelocity(0);
        if (left) this.player.body.setVelocityX(-speed);
        else if (right) this.player.body.setVelocityX(speed);
        if (up) this.player.body.setVelocityY(-speed);
        else if (down) this.player.body.setVelocityY(speed);

        if (this.player.body.velocity.length() > 0) {
          this.player.body.velocity.normalize().scale(speed);
          this.player.setTexture(Math.floor(this.time.now / 160) % 2 === 0 ? "hero-top-idle" : "hero-top-step");
        } else {
          this.player.setTexture("hero-top-idle");
        }
        this.player.setFlipX(left);

        const actionPressed = controlState.action || this.keys.E.isDown;
        if (this.portalAction && actionPressed && !this.lastAction) {
          this.portalAction();
        }
        this.lastAction = actionPressed;

        this.slimes.forEach((slime) => {
          const tag = slime.getData("tag");
          slime.setDepth(slime.y + 4);
          if (tag) {
            tag.setPosition(slime.x, slime.y - 38);
            tag.setDepth(slime.y + 5);
          }
        });
        this.player.setDepth(this.player.y + 10);
      }
    }

    const game = new Phaser.Game({
      type: Phaser.AUTO,
      parent: "game-root",
      backgroundColor: "#8fd6ff",
      pixelArt: true,
      scale: { mode: Phaser.Scale.RESIZE, width: window.innerWidth, height: window.innerHeight },
      physics: { default: "arcade", arcade: { gravity: { y: 0 }, debug: false } },
      scene: [ChapterFieldScene]
    });

    window.addEventListener("resize", () => game.scale.resize(window.innerWidth, window.innerHeight));
  </script>
</body>
</html>
