<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>數學 RPG - 冒險地圖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');

        :root {
            --bg-color: #0f172a; 
            --accent-main: #22d3ee; 
            --accent-glow: rgba(34, 211, 238, 0.4);
            --text-main: #f8fafc; 
            --border-color: #334155;
            --locked-bg: rgba(15, 23, 42, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* 鎖死畫面，防止手機上下捲動 */
            touch-action: none; /* 徹底封殺瀏覽器的觸控手勢 (如下拉更新) */
        }

        /* --- 頂部導覽列 --- */
        .top-bar {
            width: 100%; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;
            background: rgba(30, 41, 59, 0.9); border-bottom: 2px solid var(--accent-main); box-shadow: 0 0 15px var(--accent-glow);
            z-index: 100; flex-shrink: 0;
        }

        .title { font-size: 1.5rem; font-weight: 900; color: var(--accent-main); letter-spacing: 2px; }

        .player-status { display: flex; align-items: center; gap: 1rem; }
        .user-info { display: none; align-items: center; gap: 15px; font-size: 1.1rem; font-weight: bold; }
        .coin-display { color: gold; background: rgba(0,0,0,0.5); padding: 0.3rem 0.8rem; border-radius: 15px; border: 1px solid #b8860b; }
        
        .auth-btn { background: var(--accent-main); color: #000; border: none; padding: 0.5rem 1rem; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .auth-btn.logout { background: #f43f5e; color: white; }

        /* --- 遊戲地圖區 --- */
        .game-container {
            width: 100%; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 10px;
        }

        canvas {
            background-color: #064e3b; 
            background-image: radial-gradient(#0f766e 10%, transparent 10%), radial-gradient(#0f766e 10%, transparent 10%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            border: 4px solid var(--accent-main);
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            max-width: 100%; /* 確保在手機上不會破版 */
            height: auto;
            aspect-ratio: 8/5; /* 保持地圖比例 */
        }

        .locked-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--locked-bg); backdrop-filter: blur(8px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 50; text-align: center;
        }
        .locked-overlay h2 { color: var(--accent-main); font-size: 2rem; margin-bottom: 1rem; }
        
        .controls-hint {
            position: absolute; bottom: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; color: #cbd5e1;
        }

        /* 戰鬥轉場特效 */
        .battle-transition {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background-color: #000; z-index: 9999;
            opacity: 0; pointer-events: none; display: flex; justify-content: center; align-items: center;
            text-align: center; color: #f43f5e; font-size: 2.5rem; font-weight: 900; text-shadow: 0 0 20px rgba(244, 63, 94, 0.8);
        }
        .battle-transition.active { opacity: 1; pointer-events: all; animation: encounterFlash 1.2s ease-in-out forwards; }
        @keyframes encounterFlash {
            0% { background-color: transparent; opacity: 0; }
            10% { background-color: white; opacity: 1; }
            20% { background-color: black; }
            30% { background-color: white; }
            40% { background-color: black; }
            100% { background-color: black; opacity: 1; }
        }

        /* ==========================================
           🌟 新增：手機虛擬搖桿 (Virtual D-Pad)
           ========================================== */
        .dpad-container {
            display: none; /* 預設在電腦上隱藏 */
            flex-direction: column; align-items: center; gap: 10px;
            margin-top: 20px;
            user-select: none; /* 防止連按時反白文字 */
        }
        .dpad-row { display: flex; gap: 15px; }
        
        .dpad-btn {
            width: 60px; height: 60px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid var(--accent-main);
            border-radius: 50%;
            font-size: 24px; color: var(--accent-main);
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            /* 最關鍵的一行：防止按鈕觸發手機預設手勢 */
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }
        /* 當手指按下去時的發光效果 */
        .dpad-btn.active {
            background: var(--accent-main);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
            transform: scale(0.95);
        }

        /* 當螢幕寬度小於 850px (平板/手機) 時，顯示虛擬搖桿並隱藏鍵盤提示 */
        @media (max-width: 850px) {
            .dpad-container { display: flex; }
            .controls-hint { display: none; }
            .title { font-size: 1.2rem; }
            .user-info span:first-child { display: none; } /* 手機太窄，隱藏名字只留金幣 */
        }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="title">⚔️ 冒險大廳</div>
        <div class="player-status">
            <div id="user-info" class="user-info">
                <span id="player-name">勇者</span>
                <span class="coin-display">💰 <span id="player-coins">0</span></span>
            </div>
            <button id="auth-btn" class="auth-btn">Google 登入</button>
        </div>
    </header>

    <main class="game-container">
        <div id="locked-overlay" class="locked-overlay">
            <h2>⛔ 存取權限不足</h2>
            <p style="color: #94a3b8; margin-bottom: 2rem;">請先登入以喚醒您的角色。</p>
            <button class="auth-btn" style="font-size: 1.2rem; padding: 1rem 2rem;" onclick="document.getElementById('auth-btn').click()">喚醒角色</button>
        </div>

        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="controls-hint">⌨️ 使用鍵盤 <b>W A S D</b> 或 <b>方向鍵</b> 移動勇者</div>

        <div class="dpad-container">
            <div class="dpad-btn" id="btn-up">⬆️</div>
            <div class="dpad-row">
                <div class="dpad-btn" id="btn-left">⬅️</div>
                <div class="dpad-btn" id="btn-down">⬇️</div>
                <div class="dpad-btn" id="btn-right">➡️</div>
            </div>
        </div>
    </main>

    <div id="battle-transition" class="battle-transition"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBjcI122qYfHW9ibPLz-XG8kleDq4r2pF8",
            authDomain: "math-rpg-test.firebaseapp.com",
            projectId: "math-rpg-test",
            storageBucket: "math-rpg-test.firebasestorage.app",
            messagingSenderId: "593199481365",
            appId: "1:593199481365:web:7ad8656ff4aef6d0ca841c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        let isLoggedIn = false;
        let isTransitioning = false; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                isLoggedIn = true;
                document.getElementById('auth-btn').innerText = '登出';
                document.getElementById('auth-btn').classList.add('logout');
                document.getElementById('user-info').style.display = 'flex';
                document.getElementById('player-name').innerText = user.displayName;
                document.getElementById('locked-overlay').style.display = 'none';

                const userDocRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userDocRef);
                if (docSnap.exists()) {
                    document.getElementById('player-coins').innerText = docSnap.data().coins;
                }
            } else {
                isLoggedIn = false;
                document.getElementById('auth-btn').innerText = '登入';
                document.getElementById('auth-btn').classList.remove('logout');
                document.getElementById('user-info').style.display = 'none';
                document.getElementById('locked-overlay').style.display = 'flex';
            }
        });

        document.getElementById('auth-btn').addEventListener('click', () => {
            if (auth.currentUser) signOut(auth);
            else signInWithPopup(auth, provider);
        });

        // ==========================================
        // 🎮 遊戲引擎核心
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const player = { x: 50, y: 250, size: 40, speed: 4, icon: '🧙‍♂️' };
        const enemies = [
            { id: '1-1', x: 600, y: 150, size: 45, icon: '👾', title: 'CH 1-1', url: '1-1.html' },
            { id: '1-2', x: 400, y: 350, size: 45, icon: '👺', title: 'CH 1-2', url: '#' }, 
            { id: '1-3', x: 700, y: 400, size: 45, icon: '🐉', title: 'Boss', url: '#' }
        ];

        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowLeft: false, ArrowDown: false, ArrowRight: false };

        // 電腦鍵盤監聽
        window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = true; });
        window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key)) keys[e.key] = false; });

        // ==========================================
        // 🌟 新增：綁定虛擬搖桿的手指觸控事件
        // ==========================================
        function setupDpadBtn(btnId, keyName) {
            const btn = document.getElementById(btnId);
            
            // 按下或手指摸到時
            const pressDown = (e) => {
                e.preventDefault(); // 阻止瀏覽器預設行為
                keys[keyName] = true;
                btn.classList.add('active');
            };
            
            // 放開或手指離開時
            const releaseUp = (e) => {
                e.preventDefault();
                keys[keyName] = false;
                btn.classList.remove('active');
            };

            // 支援滑鼠 (方便在電腦上測試縮小視窗)
            btn.addEventListener('mousedown', pressDown);
            btn.addEventListener('mouseup', releaseUp);
            btn.addEventListener('mouseleave', releaseUp);
            // 支援手機觸控
            btn.addEventListener('touchstart', pressDown, {passive: false});
            btn.addEventListener('touchend', releaseUp, {passive: false});
            btn.addEventListener('touchcancel', releaseUp, {passive: false});
        }

        setupDpadBtn('btn-up', 'ArrowUp');
        setupDpadBtn('btn-down', 'ArrowDown');
        setupDpadBtn('btn-left', 'ArrowLeft');
        setupDpadBtn('btn-right', 'ArrowRight');

        function checkCollision(rect1, rect2) {
            return (
                rect1.x < rect2.x + rect2.size &&
                rect1.x + rect1.size > rect2.x &&
                rect1.y < rect2.y + rect2.size &&
                rect1.y + rect1.size > rect2.y
            );
        }

        function update() {
            if (!isLoggedIn || isTransitioning) return; 

            if (keys.w || keys.ArrowUp) player.y -= player.speed;
            if (keys.s || keys.ArrowDown) player.y += player.speed;
            if (keys.a || keys.ArrowLeft) player.x -= player.speed;
            if (keys.d || keys.ArrowRight) player.x += player.speed;

            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x + player.size > canvas.width) player.x = canvas.width - player.size;
            if (player.y + player.size > canvas.height) player.y = canvas.height - player.size;

            for (let i = 0; i < enemies.length; i++) {
                let enemy = enemies[i];
                if (checkCollision(player, enemy)) {
                    keys.w = keys.a = keys.s = keys.d = keys.ArrowUp = keys.ArrowLeft = keys.ArrowDown = keys.ArrowRight = false; 
                    
                    if (enemy.url !== '#') {
                        isTransitioning = true; 
                        
                        const transitionEl = document.getElementById('battle-transition');
                        transitionEl.innerHTML = `<div>⚔️ 遭遇野生怪物！<br><span style="font-size: 1.8rem; color: #22d3ee;">進入戰鬥：${enemy.title}</span></div>`;
                        transitionEl.classList.add('active'); 
                        
                        setTimeout(() => { window.location.href = enemy.url; }, 1200);

                    } else {
                        // 尚未開放的關卡，改成在畫布上顯示提示，避免 alert 中斷體驗
                        player.x -= 30; // 輕微彈開
                    }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.font = "40px Arial";
            ctx.textAlign = "left";
            ctx.textBaseline = "top";
            
            enemies.forEach(enemy => {
                ctx.fillText(enemy.icon, enemy.x, enemy.y);
                ctx.font = "16px 'Noto Sans TC'";
                ctx.fillStyle = "white";
                ctx.fillText(enemy.title, enemy.x - 5, enemy.y - 20);
                ctx.fillStyle = "red";
                ctx.fillRect(enemy.x, enemy.y - 5, 40, 5);
                ctx.font = "40px Arial"; 
            });

            if (isLoggedIn) {
                ctx.fillText(player.icon, player.x, player.y);
                ctx.font = "bold 16px 'Noto Sans TC'";
                ctx.fillStyle = "#22d3ee"; 
                let currentName = document.getElementById('player-name').innerText;
                ctx.fillText(currentName, player.x - 10, player.y - 20);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
