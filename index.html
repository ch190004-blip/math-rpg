<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#5aa8ff" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icons/icon-192.png" />
  <title>Math RPG</title>
  <link rel="stylesheet" href="./styles/start.css" />
</head>
<body>
  <div class="sky"></div>
  <div class="clouds"></div>
  <div class="mountains"></div>
  <div class="field"></div>

  <div class="hero">
    <div class="hero-shadow"></div>
  </div>

  <div class="tower">
    <div class="window one"></div>
    <div class="window two"></div>
    <div class="window three"></div>
  </div>

  <div class="card-wrap">
    <div class="floating-card" id="card">
      <div class="logo">MATH<br>RPG</div>
      <div class="sub">Google 登入後，直接進入沉浸式大廳。</div>
      <div class="status" id="status-pill">⚔️ 準備啟程</div>
      <div class="actions">
        <button class="primary-btn" id="login-btn">Google 登入啟程</button>
        <button class="ghost-btn" id="continue-btn" style="display:none;">繼續冒險</button>
      </div>
      <div class="error" id="error-text"></div>
      <div class="mini">
        Web / Android / iPhone 瀏覽器皆可直接開啟。<br>
        建議用 HTTPS 靜態主機或本機伺服器執行。
      </div>
    </div>
  </div>

  <script type="module">
    import { primeAuth, watchUser, signInGoogle } from "./js/firebase-core.js";
    import { registerServiceWorker } from "./js/app-shell.js";

    registerServiceWorker();
    const loginBtn = document.getElementById("login-btn");
    const continueBtn = document.getElementById("continue-btn");
    const statusPill = document.getElementById("status-pill");
    const errorText = document.getElementById("error-text");
    const card = document.getElementById("card");

    await primeAuth();

    let currentUser = null;
    watchUser((user, profile) => {
      currentUser = user;
      if (user && profile) {
        statusPill.textContent = `✨ ${profile.name} · Lv.${profile.level} · ${profile.coins} G`;
        loginBtn.style.display = "none";
        continueBtn.style.display = "block";
      } else {
        statusPill.textContent = "⚔️ 準備啟程";
        loginBtn.style.display = "block";
        continueBtn.style.display = "none";
      }
    });

    loginBtn.addEventListener("click", async () => {
      errorText.textContent = "";
      card.classList.add("loading");
      try {
        await signInGoogle();
      } catch (error) {
        errorText.textContent = "登入失敗：" + error.message;
      } finally {
        card.classList.remove("loading");
      }
    });

    continueBtn.addEventListener("click", () => {
      window.location.href = "./lobby.html";
    });

    window.addEventListener("pageshow", () => {
      if (currentUser) {
        continueBtn.style.display = "block";
      }
    });
  </script>
</body>
</html>
