  <script>
    window.__MATH_RPG_BUILD__ = "v8.0.0-beta.0";
    try {
      document.documentElement.setAttribute('data-build', window.__MATH_RPG_BUILD__);
      const prev = localStorage.getItem('mathRpgBuild');
      if (prev !== window.__MATH_RPG_BUILD__) {
        localStorage.setItem('mathRpgBuild', window.__MATH_RPG_BUILD__);
      }
    } catch (_e) {}
  </script>
