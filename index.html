<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>數學 RPG - 存檔測試</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #user-info { margin-top: 20px; font-weight: bold; font-size: 18px; color: blue;}
        #game-data { margin-top: 15px; font-size: 18px; color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h2>數學 RPG 遊戲 - 裝備與金幣庫測試</h2>
    <button id="login-btn">用 Google 帳號登入</button>
    <div id="user-info"></div>
    <div id="game-data"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        // 載入資料庫專用工具
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 你的專屬金鑰
        const firebaseConfig = {
            apiKey: "AIzaSyBjcI122qYfHW9ibPLz-XG8kleDq4r2pF8",
            authDomain: "math-rpg-test.firebaseapp.com",
            projectId: "math-rpg-test",
            storageBucket: "math-rpg-test.firebasestorage.app",
            messagingSenderId: "593199481365",
            appId: "1:593199481365:web:7ad8656ff4aef6d0ca841c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        document.getElementById('login-btn').addEventListener('click', () => {
            signInWithPopup(auth, provider).then(async (result) => {
                const user = result.user;
                document.getElementById('user-info').innerText = "登入成功！歡迎勇者：" + user.displayName;

                // 尋找該名玩家的專屬資料夾
                const userDocRef = doc(db, "users", user.uid);
                const docSnap = await getDoc(userDocRef);

                if (docSnap.exists()) {
                    // 檔案存在：讀取並顯示資料
                    const data = docSnap.data();
                    document.getElementById('game-data').innerText = 
                        `⚔️ 讀取存檔成功！目前等級：${data.level} | 經驗值：${data.exp} | 金幣：${data.coins}`;
                } else {
                    // 檔案不存在：建立新存檔並贈送 100 金幣
                    await setDoc(userDocRef, {
                        name: user.displayName,
                        email: user.email,
                        level: 1,
                        exp: 0,
                        coins: 100
                    });
                    document.getElementById('game-data').innerText = 
                        "🎉 發現新勇者！已為您建立專屬存檔，獲得新手禮包 100 金幣！";
                }
            }).catch((error) => {
                alert("登入失敗：" + error.message);
            });
        });
    </script>
</body>
</html>
