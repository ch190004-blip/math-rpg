<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#7ed6ff" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Math RPG｜大廳原野</title>
  <link rel="stylesheet" href="./styles/game-ui.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body class="scene-page">
  <div id="game-root"></div>

  <div class="hud">
    <div class="hud-left">
      <div class="hud-chip"><div class="scene-tag" id="hud-scene">大廳原野</div></div>
      <div class="hud-chip">
        <div class="player-meta">
          <div class="player-name" id="hud-name">勇者</div>
          <div class="player-stats"><span id="hud-level">Lv.1</span> · 💰 <span id="hud-coins">100</span></div>
        </div>
      </div>
    </div>
    <div class="hud-right">
      <div class="menu-anchor">
        <button class="menu-button" id="menu-btn">☰</button>
        <div class="menu-panel" id="menu-panel">
          <button id="menu-home">首頁</button>
          <button id="menu-fullscreen">全螢幕</button>
          <button id="menu-logout">登出</button>
        </div>
      </div>
    </div>
  </div>

  <div class="action-pill" id="action-pill"></div>
  <div class="toast" id="toast"></div>

  <div class="controls">
    <div class="dpad">
      <button class="control-button up" data-key="up">▲</button>
      <button class="control-button left" data-key="left">◀</button>
      <button class="control-button right" data-key="right">▶</button>
      <button class="control-button down" data-key="down">▼</button>
    </div>
    <div class="right-buttons"><button class="control-button action" data-key="action">A</button></div>
  </div>

  <div class="scene-fade" id="scene-fade"></div>

  <script type="module">
    import { primeAuth, watchUser, signOutGoogle } from "./js/firebase-core.js";
    import {
      registerServiceWorker, getSceneState, saveSceneState, transitionTo, showToast,
      updateHud, setupMenu, createControlState, bindControls, setActionHint
    } from "./js/app-shell.js";
    import { ensureSharedTextures, createTopdownWorld } from "./js/pixel-art.js";

    registerServiceWorker();
    await primeAuth();

    let userReady = false;
    watchUser((user, profile) => {
      userReady = true;
      if (!user) {
        showToast("請先登入", "warn", 1200);
        setTimeout(() => transitionTo("./index.html"), 500);
        return;
      }
      updateHud(profile, "大廳原野");
    });

    setupMenu({
      onHome: () => transitionTo("./index.html"),
      onLogout: async () => { await signOutGoogle(); transitionTo("./index.html"); },
      homeLabel: "首頁"
    });

    const controlState = bindControls(createControlState());

    class LobbyScene extends Phaser.Scene {
      constructor() {
        super("LobbyScene");
        this.lastAction = false;
        this.activePrompt = null;
      }

      create() {
        ensureSharedTextures(this);
        const worldWidth = 2400;
        const worldHeight = 1700;
        createTopdownWorld(this, worldWidth, worldHeight);
        this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
        this.cameras.main.setBackgroundColor("#97dfff");
        this.cameras.main.roundPixels = true;

        // Decorative sky/parallax
        for (let i = 0; i < 12; i += 1) {
          const cloud = this.add.ellipse(
            Phaser.Math.Between(0, worldWidth),
            Phaser.Math.Between(120, 420),
            Phaser.Math.Between(130, 220),
            Phaser.Math.Between(42, 72),
            0xffffff,
            0.7
          ).setScrollFactor(0.25, 0.25);
          this.tweens.add({
            targets: cloud,
            x: cloud.x + Phaser.Math.Between(120, 240),
            duration: Phaser.Math.Between(9000, 15000),
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut"
          });
        }

        this.add.tileSprite(1860, 320, 460, 300, "water-tile").setAlpha(0.92);
        this.add.ellipse(1860, 320, 520, 360, 0x74cfff, 0.18);

        const path = this.add.graphics();
        path.fillStyle(0xe1ca9f, 1);
        path.fillRoundedRect(200, 1080, 1700, 160, 40);
        path.fillRoundedRect(1350, 540, 160, 620, 34);
        path.fillRoundedRect(1200, 460, 580, 140, 34);

        this.obstacles = this.physics.add.staticGroup();

        const deco = [
          [190, 260, "tree"], [360, 230, "tree"], [540, 260, "tree"], [720, 250, "tree"], [920, 260, "tree"],
          [250, 1460, "tree"], [450, 1530, "tree"], [650, 1470, "tree"], [880, 1510, "rock"],
          [1980, 1180, "tree"], [2140, 1250, "tree"], [2300, 1170, "tree"], [2140, 1500, "tree"],
          [2060, 600, "tree"], [2240, 560, "tree"], [1660, 1480, "rock"], [1160, 1460, "tree"]
        ];

        deco.forEach(([x, y, key]) => {
          this.add.image(x, y, key).setDepth(y);
          const body = this.physics.add.staticImage(x, y + (key === "tree" ? 18 : 0), "rock").setVisible(false);
          body.body.setSize(key === "tree" ? 44 : 28, key === "tree" ? 20 : 16);
          body.refreshBody();
          this.obstacles.add(body);
        });

        for (let i = 0; i < 30; i += 1) {
          const flower = this.add.image(
            Phaser.Math.Between(100, worldWidth - 100),
            Phaser.Math.Between(100, worldHeight - 100),
            "flower"
          ).setScale(Phaser.Math.FloatBetween(0.9, 1.15)).setDepth(100);
          flower.setDepth(flower.y);
        }

        // Tower front
        const towerBase = this.add.rectangle(1450, 390, 520, 340, 0xe6d6bf).setDepth(300);
        towerBase.setStrokeStyle(10, 0xc6b08e);
        const leftTower = this.add.rectangle(1265, 350, 140, 420, 0xe1cfb4).setDepth(299);
        leftTower.setStrokeStyle(8, 0xb79770);
        const rightTower = this.add.rectangle(1635, 350, 140, 420, 0xe1cfb4).setDepth(299);
        rightTower.setStrokeStyle(8, 0xb79770);
        this.add.triangle(1450, 150, -300, 100, 0, -120, 300, 100, 0x9471ff).setDepth(301).setScale(0.9, 1);
        this.add.triangle(1265, 70, -90, 90, 0, -90, 90, 90, 0x6c90ff).setDepth(300);
        this.add.triangle(1635, 70, -90, 90, 0, -90, 90, 90, 0x6c90ff).setDepth(300);

        [1280, 1450, 1620].forEach((x) => this.add.image(x, 330, "window").setScale(1.0).setDepth(302));
        [1388, 1512].forEach((x) => this.add.image(x, 228, "window").setScale(0.9).setDepth(302));

        this.add.text(1450, 70, "七 上 之 塔", { fontFamily: "Noto Sans TC", fontSize: "34px", color: "#ffffff", fontStyle: "900" }).setOrigin(0.5).setDepth(310);
        this.add.image(1450, 570, "door-open").setScale(1.8).setDepth(303);
        this.add.rectangle(1450, 720, 280, 34, 0x33549e, 0.18).setDepth(280);
        this.add.text(1450, 780, "走近大門按 A 進入", { fontFamily: "Noto Sans TC", fontSize: "22px", color: "#2a477e", fontStyle: "900" }).setOrigin(0.5).setDepth(310);

        this.towerZone = this.add.zone(1450, 640, 280, 220);
        this.physics.world.enable(this.towerZone);
        this.towerZone.body.setAllowGravity(false);
        this.towerZone.body.moves = false;

        const start = getSceneState("lobby", { x: 460, y: 1100 });
        this.player = this.physics.add.sprite(start.x, start.y, "hero-top-idle");
        this.player.setCollideWorldBounds(true);
        this.player.setSize(16, 14);
        this.player.setOffset(4, 14);
        this.player.body.setMaxVelocity(230, 230);

        this.physics.add.collider(this.player, this.obstacles);
        this.physics.add.overlap(this.player, this.towerZone, () => {
          this.activePrompt = {
            label: "A 進入 七上之塔",
            action: () => {
              saveSceneState("lobby", { x: this.player.x, y: this.player.y });
              transitionTo("./tower-seven-up.html");
            }
          };
        });

        this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
        const zoom = Math.min(window.innerWidth / 520, window.innerHeight / 320);
        this.cameras.main.setZoom(Phaser.Math.Clamp(zoom, 1.45, 2.45));

        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys("W,A,S,D,E");
        this.time.addEvent({
          delay: 1200,
          loop: true,
          callback: () => saveSceneState("lobby", { x: this.player.x, y: this.player.y })
        });
      }

      update() {
        if (!userReady) return;
        this.activePrompt = null;
        this.physics.world.overlap(this.player, this.towerZone);

        const speed = 176;
        const left = this.cursors.left.isDown || this.keys.A.isDown || controlState.left;
        const right = this.cursors.right.isDown || this.keys.D.isDown || controlState.right;
        const up = this.cursors.up.isDown || this.keys.W.isDown || controlState.up;
        const down = this.cursors.down.isDown || this.keys.S.isDown || controlState.down;

        this.player.body.setVelocity(0);
        if (left) this.player.body.setVelocityX(-speed);
        else if (right) this.player.body.setVelocityX(speed);
        if (up) this.player.body.setVelocityY(-speed);
        else if (down) this.player.body.setVelocityY(speed);

        if (this.player.body.velocity.length() > 0) {
          this.player.body.velocity.normalize().scale(speed);
          this.player.setTexture(Math.floor(this.time.now / 170) % 2 === 0 ? "hero-top-idle" : "hero-top-step");
        } else {
          this.player.setTexture("hero-top-idle");
        }
        this.player.setFlipX(left);

        setActionHint(this.activePrompt ? this.activePrompt.label : "");
        const actionPressed = controlState.action || this.keys.E.isDown || Phaser.Input.Keyboard.JustDown(this.cursors.space);
        if (this.activePrompt && actionPressed && !this.lastAction) {
          this.activePrompt.action();
        }
        this.lastAction = actionPressed;
        this.player.setDepth(this.player.y + 10);
      }
    }

    const game = new Phaser.Game({
      type: Phaser.AUTO,
      parent: "game-root",
      backgroundColor: "#8fd6ff",
      pixelArt: true,
      scale: { mode: Phaser.Scale.RESIZE, width: window.innerWidth, height: window.innerHeight },
      physics: { default: "arcade", arcade: { gravity: { y: 0 }, debug: false } },
      scene: [LobbyScene]
    });

    window.addEventListener("resize", () => game.scale.resize(window.innerWidth, window.innerHeight));
  </script>
</body>
</html>
