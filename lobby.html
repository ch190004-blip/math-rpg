<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#7ed6ff" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Math RPG｜大廳原野</title>
  <link rel="stylesheet" href="./styles/game-ui.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body class="scene-page">
  <div id="game-root"></div>

  <div class="hud">
    <div class="hud-left">
      <div class="hud-chip"><div class="scene-tag" id="hud-scene">大廳原野</div></div>
      <div class="hud-chip">
        <div class="player-meta">
          <div class="player-name" id="hud-name">勇者</div>
          <div class="player-stats"><span id="hud-level">Lv.1</span> · 💰 <span id="hud-coins">100</span></div>
        </div>
      </div>
    </div>
    <div class="hud-right">
      <div class="menu-anchor">
        <button class="menu-button" id="menu-btn">☰</button>
        <div class="menu-panel" id="menu-panel">
          <button id="menu-home">首頁</button>
          <button id="menu-fullscreen">全螢幕</button>
          <button id="menu-logout">登出</button>
        </div>
      </div>
    </div>
  </div>

  <div class="keyboard-guide">電腦：WASD / 方向鍵移動</div>
  <div class="action-pill" id="action-pill"></div>
  <div class="toast" id="toast"></div>

  <div class="controls">
    <div class="dpad">
      <button class="control-button up" data-key="up">▲</button>
      <button class="control-button left" data-key="left">◀</button>
      <button class="control-button right" data-key="right">▶</button>
      <button class="control-button down" data-key="down">▼</button>
    </div>
    <div class="right-buttons"><button class="control-button action" data-key="action">互動</button></div>
  </div>

  <div class="scene-fade" id="scene-fade"></div>

  <script type="module">
    import { primeAuth, watchUser, signOutGoogle } from "./js/firebase-core.js";
    import {
      registerServiceWorker, getSceneState, saveSceneState, transitionTo, showToast,
      updateHud, setupMenu, createControlState, bindControls, setActionHint
    } from "./js/app-shell.js";
    import { ensureSharedTextures, createTopdownWorld } from "./js/pixel-art.js";

    registerServiceWorker();
    await primeAuth();

    let userReady = false;
    watchUser((user, profile) => {
      userReady = true;
      if (!user) {
        showToast("請先登入", "warn", 1200);
        setTimeout(() => transitionTo("./index.html"), 500);
        return;
      }
      updateHud(profile, "大廳原野");
    });

    setupMenu({
      onHome: () => transitionTo("./index.html"),
      onLogout: async () => { await signOutGoogle(); transitionTo("./index.html"); },
      homeLabel: "首頁"
    });

    const controlState = bindControls(createControlState());

    class LobbyScene extends Phaser.Scene {
      constructor() {
        super("LobbyScene");
        this.entering = false;
      }

      create() {
        ensureSharedTextures(this);
        const worldWidth = 2200;
        const worldHeight = 1600;
        createTopdownWorld(this, worldWidth, worldHeight);
        this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
        this.cameras.main.setBackgroundColor("#95ddff");
        this.cameras.main.roundPixels = true;

        for (let i = 0; i < 10; i += 1) {
          const cloud = this.add.ellipse(
            Phaser.Math.Between(0, worldWidth),
            Phaser.Math.Between(100, 340),
            Phaser.Math.Between(120, 220),
            Phaser.Math.Between(40, 66),
            0xffffff,
            0.72
          ).setScrollFactor(0.25, 0.25);
          this.tweens.add({
            targets: cloud,
            x: cloud.x + Phaser.Math.Between(120, 220),
            duration: Phaser.Math.Between(9000, 15000),
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut"
          });
        }

        this.add.tileSprite(1820, 340, 440, 260, "water-tile").setAlpha(0.92);
        this.add.ellipse(1820, 340, 490, 290, 0x7dd6ff, 0.18);

        const path = this.add.graphics();
        path.fillStyle(0xe4cfa6, 1);
        path.fillRoundedRect(180, 1070, 1500, 150, 38);
        path.fillRoundedRect(1420, 680, 140, 450, 28);
        path.fillRoundedRect(1280, 640, 400, 120, 30);
        path.fillRoundedRect(1455, 560, 90, 120, 18);

        this.obstacles = this.physics.add.staticGroup();
        const deco = [
          [220, 260, "tree"], [420, 260, "tree"], [650, 270, "tree"], [910, 240, "tree"],
          [260, 1470, "tree"], [520, 1490, "tree"], [810, 1500, "rock"], [1100, 1450, "tree"],
          [1960, 1260, "tree"], [2100, 1320, "tree"], [1960, 620, "tree"], [2080, 560, "tree"],
          [1150, 280, "rock"], [1430, 230, "flower"]
        ];
        deco.forEach(([x, y, key]) => {
          const sprite = this.add.image(x, y, key).setDepth(y);
          if (key !== "flower") {
            const body = this.physics.add.staticImage(x, y + (key === "tree" ? 18 : 0), "rock").setVisible(false);
            body.body.setSize(key === "tree" ? 44 : 28, key === "tree" ? 20 : 16);
            body.refreshBody();
            this.obstacles.add(body);
          } else {
            sprite.setScale(1.2);
          }
        });
        for (let i = 0; i < 30; i += 1) {
          const flower = this.add.image(
            Phaser.Math.Between(80, worldWidth - 80),
            Phaser.Math.Between(90, worldHeight - 90),
            "flower"
          ).setScale(Phaser.Math.FloatBetween(0.8, 1.15));
          flower.setDepth(flower.y);
        }

        const towerX = 1488;
        const towerY = 460;
        this.add.rectangle(towerX, towerY, 280, 210, 0xe6d8c4).setStrokeStyle(8, 0xbd9f78).setDepth(300);
        this.add.rectangle(towerX - 86, towerY - 6, 74, 250, 0xdeceb4).setStrokeStyle(6, 0xb79770).setDepth(301);
        this.add.rectangle(towerX + 86, towerY - 6, 74, 250, 0xdeceb4).setStrokeStyle(6, 0xb79770).setDepth(301);
        this.add.triangle(towerX, towerY - 150, -150, 78, 0, -108, 150, 78, 0x7b67f7).setDepth(302);
        this.add.triangle(towerX - 86, towerY - 170, -54, 68, 0, -70, 54, 68, 0x5d8dff).setDepth(302);
        this.add.triangle(towerX + 86, towerY - 170, -54, 68, 0, -70, 54, 68, 0x5d8dff).setDepth(302);
        this.add.image(towerX - 82, towerY - 22, "window").setScale(0.72).setDepth(304);
        this.add.image(towerX, towerY - 38, "window").setScale(0.86).setDepth(304);
        this.add.image(towerX + 82, towerY - 22, "window").setScale(0.72).setDepth(304);
        this.add.image(towerX, towerY + 88, "door-open").setScale(1.18).setDepth(305);
        this.add.text(towerX, towerY - 210, "七上之塔", {
          fontFamily: "Noto Sans TC",
          fontSize: "34px",
          color: "#ffffff",
          fontStyle: "900",
          stroke: "#3f5e94",
          strokeThickness: 4
        }).setOrigin(0.5).setDepth(310);
        this.add.rectangle(towerX, towerY + 164, 130, 18, 0x7a5d35, 0.18).setDepth(280);
        this.add.text(towerX, towerY + 220, "直接碰到大門就會進塔", {
          fontFamily: "Noto Sans TC",
          fontSize: "22px",
          color: "#23456e",
          fontStyle: "900"
        }).setOrigin(0.5).setDepth(310);

        this.towerZone = this.physics.add.staticImage(towerX, towerY + 118, "rock").setVisible(false);
        this.towerZone.body.setSize(120, 90);
        this.towerZone.refreshBody();

        const spawn = getSceneState("lobby", { x: 540, y: 1140 });
        this.player = this.physics.add.sprite(spawn.x, spawn.y, "hero-top-idle");
        this.player.setCollideWorldBounds(true);
        this.player.setCircle(8, 4, 18);
        this.player.body.setDrag(400, 400);

        this.physics.add.collider(this.player, this.obstacles);
        this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
        const zoom = Math.min(window.innerWidth / 520, window.innerHeight / 320);
        this.cameras.main.setZoom(Phaser.Math.Clamp(zoom, 1.38, 2.2));

        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys("W,A,S,D");
      }

      update() {
        if (!userReady) return;
        const speed = 176;
        const left = this.cursors.left.isDown || this.keys.A.isDown || controlState.left;
        const right = this.cursors.right.isDown || this.keys.D.isDown || controlState.right;
        const up = this.cursors.up.isDown || this.keys.W.isDown || controlState.up;
        const down = this.cursors.down.isDown || this.keys.S.isDown || controlState.down;

        this.player.body.setVelocity(0);
        if (left) this.player.body.setVelocityX(-speed);
        else if (right) this.player.body.setVelocityX(speed);
        if (up) this.player.body.setVelocityY(-speed);
        else if (down) this.player.body.setVelocityY(speed);

        if (this.player.body.velocity.length() > 0) {
          this.player.body.velocity.normalize().scale(speed);
          this.player.setTexture(Math.floor(this.time.now / 160) % 2 === 0 ? "hero-top-idle" : "hero-top-step");
        } else {
          this.player.setTexture("hero-top-idle");
        }
        this.player.setFlipX(left);
        this.player.setDepth(this.player.y + 10);

        const touchingTower = this.physics.world.overlap(this.player, this.towerZone);
        setActionHint(touchingTower ? "進入七上之塔" : "");
        if (touchingTower && !this.entering) {
          this.entering = true;
          saveSceneState("lobby", { x: this.player.x, y: this.player.y });
          showToast("進入七上之塔", "normal", 600);
          transitionTo("./tower-seven-up.html");
        }
      }
    }

    const game = new Phaser.Game({
      type: Phaser.AUTO,
      parent: "game-root",
      backgroundColor: "#8fd6ff",
      pixelArt: true,
      scale: { mode: Phaser.Scale.RESIZE, width: window.innerWidth, height: window.innerHeight },
      physics: { default: "arcade", arcade: { gravity: { y: 0 }, debug: false } },
      scene: [LobbyScene]
    });

    window.addEventListener("resize", () => game.scale.resize(window.innerWidth, window.innerHeight));
  </script>
</body>
</html>
