<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#9edfff" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Math RPG｜七上之塔</title>
  <link rel="stylesheet" href="./styles/game-ui.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body class="scene-page">
  <div id="game-root"></div>

  <div class="hud">
    <div class="hud-left">
      <div class="hud-chip"><div class="scene-tag" id="hud-scene">七上之塔</div></div>
      <div class="hud-chip">
        <div class="player-meta">
          <div class="player-name" id="hud-name">勇者</div>
          <div class="player-stats"><span id="hud-level">Lv.1</span> · 💰 <span id="hud-coins">100</span></div>
        </div>
      </div>
    </div>
    <div class="hud-right">
      <div class="menu-anchor">
        <button class="menu-button" id="menu-btn">☰</button>
        <div class="menu-panel" id="menu-panel">
          <button id="menu-home">回大廳</button>
          <button id="menu-fullscreen">全螢幕</button>
          <button id="menu-logout">登出</button>
        </div>
      </div>
    </div>
  </div>

  <div class="keyboard-guide">電腦：左右移動 · E/Space 進門 · 上下或互動切換樓層</div>
  <div class="action-pill" id="action-pill"></div>
  <div class="toast" id="toast"></div>

  <div class="controls">
    <div class="dpad">
      <button class="control-button up" data-key="up">▲</button>
      <button class="control-button left" data-key="left">◀</button>
      <button class="control-button right" data-key="right">▶</button>
      <button class="control-button down" data-key="down">▼</button>
    </div>
    <div class="right-buttons"><button class="control-button action" data-key="action">互動</button></div>
  </div>

  <div class="scene-fade" id="scene-fade"></div>

  <script type="module">
    import { primeAuth, watchUser, signOutGoogle } from "./js/firebase-core.js";
    import {
      registerServiceWorker, getSceneState, saveSceneState, transitionTo, showToast,
      updateHud, setupMenu, createControlState, bindControls, setActionHint
    } from "./js/app-shell.js";
    import { ensureSharedTextures } from "./js/pixel-art.js";

    registerServiceWorker();
    await primeAuth();

    let userReady = false;
    watchUser((user, profile) => {
      userReady = true;
      if (!user) {
        showToast("請先登入", "warn", 1200);
        setTimeout(() => transitionTo("./index.html"), 500);
        return;
      }
      updateHud(profile, "七上之塔");
    });

    setupMenu({
      onHome: () => transitionTo("./lobby.html"),
      onLogout: async () => { await signOutGoogle(); transitionTo("./index.html"); },
      homeLabel: "回大廳"
    });

    const controlState = bindControls(createControlState());

    class TowerScene extends Phaser.Scene {
      constructor() {
        super("TowerScene");
        this.floorIndex = 0;
        this.lastAction = false;
        this.prompts = [];
        this.switching = false;
      }

      create() {
        ensureSharedTextures(this);
        const worldWidth = 2800;
        const worldHeight = 1500;
        this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
        this.cameras.main.setBackgroundColor("#a9e5ff");
        this.cameras.main.roundPixels = true;

        for (let i = 0; i < 12; i += 1) {
          const cloud = this.add.ellipse(
            Phaser.Math.Between(0, worldWidth),
            Phaser.Math.Between(70, 240),
            Phaser.Math.Between(120, 220),
            Phaser.Math.Between(40, 66),
            0xffffff,
            0.74
          ).setScrollFactor(0.28, 0.28);
          this.tweens.add({
            targets: cloud,
            x: cloud.x + Phaser.Math.Between(160, 280),
            duration: Phaser.Math.Between(9000, 14000),
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut"
          });
        }

        const towerWall = this.add.rectangle(worldWidth / 2, 820, worldWidth, 1180, 0xf4e7d2).setDepth(-20);
        towerWall.setStrokeStyle(8, 0xc5ad89);

        [280, 650, 1020].forEach((y) => {
          for (let x = 240; x <= worldWidth - 240; x += 320) {
            this.add.image(x, y, "window").setScale(0.82).setDepth(-2).setAlpha(0.92);
          }
        });

        this.floors = [
          { y: 1120, label: "第一區 · 第 1 章", color: "#23466d" },
          { y: 760, label: "第二區 · 第 2 章", color: "#224f76" },
          { y: 400, label: "第三區 · 第 3 章", color: "#294a70" }
        ];
        this.floors.forEach((floor) => {
          this.add.rectangle(1400, floor.y, 2360, 78, 0xf5e4c8).setStrokeStyle(8, 0xb59672).setDepth(1);
          this.add.text(240, floor.y - 88, floor.label, {
            fontFamily: "Noto Sans TC",
            fontSize: "30px",
            color: floor.color,
            fontStyle: "900"
          }).setDepth(6);
        });

        this.add.text(1400, 110, "七 上 之 塔", {
          fontFamily: "Noto Sans TC",
          fontSize: "44px",
          color: "#ffffff",
          fontStyle: "900",
          stroke: "#466da4",
          strokeThickness: 4
        }).setOrigin(0.5).setDepth(10);

        this.add.text(1400, 170, "三區直覺切換，不走迷宮", {
          fontFamily: "Noto Sans TC",
          fontSize: "22px",
          color: "#244370",
          fontStyle: "900"
        }).setOrigin(0.5).setDepth(10);

        this.createLift(1400, this.floors[0].y - 56, "▲ 前往第二區");
        this.createLift(1400, this.floors[1].y - 56, "▲ 上到第三區 / ▼ 回第一區");
        this.createLift(1400, this.floors[2].y - 56, "▼ 回第二區");

        const doorStyle = { fontFamily: "Noto Sans TC", fontSize: "22px", color: "#25436f", fontStyle: "900" };
        const lockStyle = { fontFamily: "Noto Sans TC", fontSize: "18px", color: "#7f6b57", fontStyle: "900" };

        const doors = [
          { floor: 0, x: 280, title: "回大廳", target: "./lobby.html", active: true, label: "進入大廳" },
          { floor: 0, x: 760, title: "1-1 負數與數線", target: "./chapter-1-1-field.html", active: true, label: "進入 1-1 原野" },
          { floor: 0, x: 1040, title: "1-2 整數加減", active: false },
          { floor: 0, x: 1760, title: "1-3 整數乘除", active: false },
          { floor: 0, x: 2080, title: "1-4 指數記法", active: false },

          { floor: 1, x: 720, title: "2-1 因數與倍數", active: false },
          { floor: 1, x: 1040, title: "2-2 最大公因數", active: false },
          { floor: 1, x: 1760, title: "2-3 分數四則", active: false },
          { floor: 1, x: 2080, title: "2-4 指數律", active: false },

          { floor: 2, x: 980, title: "3-1 代數式化簡", active: false },
          { floor: 2, x: 1560, title: "3-2 一元一次方程式", active: false },
          { floor: 2, x: 2140, title: "3-3 應用問題", active: false }
        ];

        doors.forEach((door) => {
          const floorY = this.floors[door.floor].y;
          this.add.image(door.x, floorY - 58, "door-open").setScale(1.08).setAlpha(door.active ? 1 : 0.44).setDepth(5);
          this.add.text(door.x, floorY - 154, door.title, door.active ? doorStyle : { ...doorStyle, color: "#77614a" }).setOrigin(0.5).setDepth(6);
          if (!door.active) {
            this.add.text(door.x, floorY + 14, "LOCK", lockStyle).setOrigin(0.5).setDepth(6);
          }
          this.prompts.push({
            floor: door.floor,
            x: door.x,
            y: floorY - 58,
            w: 120,
            h: 150,
            label: door.active ? `E / Space ${door.label || "進入"}` : "尚未開放",
            action: () => {
              if (!door.active) {
                showToast("這個章節之門尚未開放", "warn", 1500);
                return;
              }
              saveSceneState("tower", { x: this.player.x, floor: this.floorIndex });
              transitionTo(door.target);
            }
          });
        });

        this.prompts.push({
          floor: 0,
          x: 1400,
          y: this.floors[0].y - 54,
          w: 150,
          h: 100,
          label: "上鍵 / 互動 前往第二區",
          action: () => this.moveFloor(1)
        });
        this.prompts.push({
          floor: 1,
          x: 1400,
          y: this.floors[1].y - 54,
          w: 150,
          h: 110,
          label: "上鍵到第三區 · 下鍵回第一區",
          action: (dir) => this.moveFloor(dir === "down" ? 0 : 2)
        });
        this.prompts.push({
          floor: 2,
          x: 1400,
          y: this.floors[2].y - 54,
          w: 150,
          h: 100,
          label: "下鍵 / 互動 回第二區",
          action: () => this.moveFloor(1)
        });

        const state = getSceneState("tower", { x: 420, floor: 0 });
        this.floorIndex = Phaser.Math.Clamp(state.floor ?? 0, 0, this.floors.length - 1);
        this.player = this.physics.add.sprite(state.x || 420, this.floors[this.floorIndex].y - 56, "hero-side-idle");
        this.player.setCollideWorldBounds(true);
        this.player.body.allowGravity = false;
        this.player.body.setSize(16, 28);
        this.player.setDepth(12);

        this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
        const zoom = Math.min(window.innerWidth / 580, window.innerHeight / 320);
        this.cameras.main.setZoom(Phaser.Math.Clamp(zoom, 1.25, 2.0));

        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys("A,D,E,W,S");
      }

      createLift(x, y, label) {
        this.add.ellipse(x, y + 12, 130, 22, 0x33549e, 0.2).setDepth(2);
        this.add.image(x, y, "portal").setScale(0.92).setDepth(3);
        this.add.text(x, y + 94, label, {
          fontFamily: "Noto Sans TC",
          fontSize: "22px",
          color: "#214b73",
          fontStyle: "900"
        }).setOrigin(0.5).setDepth(4);
      }

      moveFloor(nextFloor) {
        if (this.switching || nextFloor === this.floorIndex) return;
        this.switching = true;
        this.floorIndex = Phaser.Math.Clamp(nextFloor, 0, this.floors.length - 1);
        this.tweens.add({
          targets: this.player,
          y: this.floors[this.floorIndex].y - 56,
          duration: 220,
          ease: "Sine.easeOut",
          onComplete: () => {
            this.switching = false;
            saveSceneState("tower", { x: this.player.x, floor: this.floorIndex });
          }
        });
      }

      update() {
        if (!userReady) return;

        const left = this.cursors.left.isDown || this.keys.A.isDown || controlState.left;
        const right = this.cursors.right.isDown || this.keys.D.isDown || controlState.right;
        const upPressed = this.cursors.up.isDown || this.keys.W.isDown || controlState.up;
        const downPressed = this.cursors.down.isDown || this.keys.S.isDown || controlState.down;
        const actionPressed = this.keys.E.isDown || controlState.action || this.cursors.space.isDown;

        if (!this.switching) {
          if (left) {
            this.player.x -= 3.1;
            this.player.setTexture("hero-side-run");
            this.player.setFlipX(true);
          } else if (right) {
            this.player.x += 3.1;
            this.player.setTexture("hero-side-run");
            this.player.setFlipX(false);
          } else {
            this.player.setTexture("hero-side-idle");
          }
        }

        this.player.x = Phaser.Math.Clamp(this.player.x, 180, 2620);
        this.player.y = this.floors[this.floorIndex].y - 56;
        this.player.setDepth(this.player.y + 10);

        let activePrompt = null;
        for (const prompt of this.prompts) {
          if (prompt.floor !== this.floorIndex) continue;
          if (Math.abs(this.player.x - prompt.x) <= prompt.w / 2 && Math.abs(this.player.y - prompt.y) <= prompt.h / 2) {
            activePrompt = prompt;
            break;
          }
        }
        setActionHint(activePrompt ? activePrompt.label : "");

        if (activePrompt && !this.lastAction) {
          if (this.floorIndex === 1 && activePrompt.x === 1400 && (upPressed || downPressed || actionPressed)) {
            activePrompt.action(downPressed ? "down" : "up");
          } else if (this.floorIndex === 0 && activePrompt.x === 1400 && (upPressed || actionPressed)) {
            activePrompt.action();
          } else if (this.floorIndex === 2 && activePrompt.x === 1400 && (downPressed || actionPressed)) {
            activePrompt.action();
          } else if (activePrompt.x !== 1400 && actionPressed) {
            activePrompt.action();
          }
        }

        this.lastAction = actionPressed || upPressed || downPressed;
      }
    }

    const game = new Phaser.Game({
      type: Phaser.AUTO,
      parent: "game-root",
      backgroundColor: "#a8e3ff",
      pixelArt: true,
      scale: { mode: Phaser.Scale.RESIZE, width: window.innerWidth, height: window.innerHeight },
      physics: { default: "arcade", arcade: { gravity: { y: 0 }, debug: false } },
      scene: [TowerScene]
    });

    window.addEventListener("resize", () => game.scale.resize(window.innerWidth, window.innerHeight));
  </script>
</body>
</html>
