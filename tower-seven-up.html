<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#9edfff" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <title>Math RPG｜七上之塔</title>
  <link rel="stylesheet" href="./styles/game-ui.css" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body class="scene-page">
  <div id="game-root"></div>

  <div class="hud">
    <div class="hud-left">
      <div class="hud-chip"><div class="scene-tag" id="hud-scene">七上之塔</div></div>
      <div class="hud-chip">
        <div class="player-meta">
          <div class="player-name" id="hud-name">勇者</div>
          <div class="player-stats"><span id="hud-level">Lv.1</span> · 💰 <span id="hud-coins">100</span></div>
        </div>
      </div>
    </div>
    <div class="hud-right">
      <div class="menu-anchor">
        <button class="menu-button" id="menu-btn">☰</button>
        <div class="menu-panel" id="menu-panel">
          <button id="menu-home">回大廳</button>
          <button id="menu-fullscreen">全螢幕</button>
          <button id="menu-logout">登出</button>
        </div>
      </div>
    </div>
  </div>

  <div class="action-pill" id="action-pill"></div>
  <div class="toast" id="toast"></div>

  <div class="controls">
    <div class="dpad">
      <button class="control-button up" data-key="up">▲</button>
      <button class="control-button left" data-key="left">◀</button>
      <button class="control-button right" data-key="right">▶</button>
      <button class="control-button down" data-key="down">▼</button>
    </div>
    <div class="right-buttons"><button class="control-button action" data-key="action">A</button></div>
  </div>

  <div class="scene-fade" id="scene-fade"></div>

  <script type="module">
    import { primeAuth, watchUser, signOutGoogle } from "./js/firebase-core.js";
    import {
      registerServiceWorker, getSceneState, saveSceneState, transitionTo, showToast,
      updateHud, setupMenu, createControlState, bindControls, setActionHint
    } from "./js/app-shell.js";
    import { ensureSharedTextures } from "./js/pixel-art.js";

    registerServiceWorker();
    await primeAuth();

    let userReady = false;
    watchUser((user, profile) => {
      userReady = true;
      if (!user) {
        showToast("請先登入", "warn", 1200);
        setTimeout(() => transitionTo("./index.html"), 500);
        return;
      }
      updateHud(profile, "七上之塔");
    });

    setupMenu({
      onHome: () => transitionTo("./lobby.html"),
      onLogout: async () => { await signOutGoogle(); transitionTo("./index.html"); },
      homeLabel: "回大廳"
    });

    const controlState = bindControls(createControlState());

    class TowerScene extends Phaser.Scene {
      constructor() {
        super("TowerScene");
        this.activePrompt = null;
        this.lastAction = false;
        this.isTransitioning = false;
      }

      create() {
        ensureSharedTextures(this);
        const worldWidth = 4200;
        const worldHeight = 1500;
        this.physics.world.setBounds(0, 0, worldWidth, worldHeight);
        this.cameras.main.setBackgroundColor("#a8e3ff");
        this.cameras.main.roundPixels = true;

        for (let i = 0; i < 12; i += 1) {
          const cloud = this.add.ellipse(
            Phaser.Math.Between(0, worldWidth),
            Phaser.Math.Between(70, 240),
            Phaser.Math.Between(120, 220),
            Phaser.Math.Between(40, 66),
            0xffffff,
            0.76
          ).setScrollFactor(0.28, 0.28);
          this.tweens.add({
            targets: cloud,
            x: cloud.x + Phaser.Math.Between(160, 280),
            duration: Phaser.Math.Between(9000, 14000),
            yoyo: true,
            repeat: -1,
            ease: "Sine.easeInOut"
          });
        }

        const wall = this.add.tileSprite(worldWidth / 2, 820, worldWidth, 1180, "tower-wall").setDepth(-20);
        wall.setTint(0xf6ebd8);

        [260, 620, 980].forEach((y) => {
          for (let x = 240; x <= worldWidth - 240; x += 360) {
            this.add.image(x, y, "window").setDepth(-2).setAlpha(0.92);
          }
        });

        this.platforms = this.physics.add.staticGroup();
        const floors = [
          { x: 1000, y: 1180, w: 1900, h: 82, label: "第一區 · 第 1 章", color: "#294671" },
          { x: 2250, y: 780, w: 2000, h: 82, label: "第二區 · 第 2 章", color: "#28557e" },
          { x: 3150, y: 380, w: 1500, h: 82, label: "第三區 · 第 3 章", color: "#2d4e73" }
        ];
        floors.forEach(({ x, y, w, h, label, color }) => {
          this.add.rectangle(x, y, w, h, 0xf5e4c8).setStrokeStyle(8, 0xb59672).setDepth(0);
          const body = this.physics.add.staticImage(x, y, "rock").setVisible(false);
          body.body.setSize(w, h);
          body.refreshBody();
          this.platforms.add(body);
          this.add.text(x - w / 2 + 50, y - 88, label, {
            fontFamily: "Noto Sans TC",
            fontSize: "30px",
            color,
            fontStyle: "900"
          }).setDepth(6);
        });

        // easy stair pads between floors
        this.add.image(1750, 1020, "stairs").setScale(2.0, 1.4).setDepth(4);
        this.add.text(1750, 1110, "上樓", { fontFamily: "Noto Sans TC", fontSize: "22px", color: "#214b73", fontStyle: "900" }).setOrigin(0.5);
        this.add.image(1750, 620, "stairs").setScale(2.0, 1.4).setDepth(4).setFlipX(true);
        this.add.text(1750, 710, "下樓", { fontFamily: "Noto Sans TC", fontSize: "22px", color: "#214b73", fontStyle: "900" }).setOrigin(0.5);

        this.add.image(2900, 620, "stairs").setScale(2.0, 1.4).setDepth(4);
        this.add.text(2900, 710, "上樓", { fontFamily: "Noto Sans TC", fontSize: "22px", color: "#214b73", fontStyle: "900" }).setOrigin(0.5);
        this.add.image(2900, 220, "stairs").setScale(2.0, 1.4).setDepth(4).setFlipX(true);
        this.add.text(2900, 310, "下樓", { fontFamily: "Noto Sans TC", fontSize: "22px", color: "#214b73", fontStyle: "900" }).setOrigin(0.5);

        const doorStyle = { fontFamily: "Noto Sans TC", fontSize: "22px", color: "#25436f", fontStyle: "900" };
        const lockStyle = { fontFamily: "Noto Sans TC", fontSize: "18px", color: "#7f6b57", fontStyle: "900" };

        const doors = [
          { x: 220, y: 1060, title: "回大廳", target: "./lobby.html", active: true, zone: "return" },
          { x: 850, y: 1060, title: "1-1 負數與數線", target: "./chapter-1-1-field.html", active: true },
          { x: 1150, y: 1060, title: "1-2 整數加減", active: false },
          { x: 1450, y: 1060, title: "1-3 整數乘除", active: false },
          { x: 1750, y: 1060, title: "1-4 指數記法", active: false },

          { x: 2050, y: 660, title: "2-1 因數與倍數", active: false },
          { x: 2350, y: 660, title: "2-2 最大公因數", active: false },
          { x: 2650, y: 660, title: "2-3 分數四則", active: false },
          { x: 2950, y: 660, title: "2-4 指數律", active: false },

          { x: 3000, y: 260, title: "3-1 代數式化簡", active: false },
          { x: 3300, y: 260, title: "3-2 一元一次方程式", active: false },
          { x: 3600, y: 260, title: "3-3 應用問題", active: false }
        ];

        this.prompts = [];

        doors.forEach((door) => {
          this.add.image(door.x, door.y, "door-open").setScale(1.16).setAlpha(door.active ? 1 : 0.48).setDepth(5);
          this.add.text(door.x, door.y - 94, door.title, door.active ? doorStyle : { ...doorStyle, color: "#77614a" }).setOrigin(0.5).setDepth(6);
          if (!door.active) {
            this.add.text(door.x, door.y + 70, "LOCK", lockStyle).setOrigin(0.5).setDepth(6);
          }
          const zone = this.makeZone(door.x, door.y, 140, 160);
          this.prompts.push({
            zone,
            label: door.active ? `A ${door.zone === "return" ? "回大廳" : "進入 " + door.title}` : "尚未開放",
            action: () => {
              if (!door.active) {
                showToast("這個章節之門稍後開放", "warn", 1500);
                return;
              }
              saveSceneState("tower", { x: this.player.x, y: this.player.y });
              transitionTo(door.target);
            }
          });
        });

        const stairLinks = [
          { x: 1750, y: 1010, w: 200, h: 150, label: "▲ 上到第二區", tx: 2050, ty: 610 },
          { x: 1750, y: 610, w: 200, h: 150, label: "▼ 回第一區", tx: 1600, ty: 1020 },
          { x: 2900, y: 610, w: 200, h: 150, label: "▲ 上到第三區", tx: 3150, ty: 210 },
          { x: 2900, y: 210, w: 200, h: 150, label: "▼ 回第二區", tx: 2750, ty: 620 }
        ];
        stairLinks.forEach((stair) => {
          this.prompts.push({
            zone: this.makeZone(stair.x, stair.y, stair.w, stair.h),
            label: stair.label,
            action: () => this.useStair(stair.tx, stair.ty)
          });
        });

        const start = getSceneState("tower", { x: 300, y: 1000 });
        this.player = this.physics.add.sprite(start.x, start.y, "hero-side-idle");
        this.player.setSize(14, 30);
        this.player.setOffset(4, 2);
        this.player.setCollideWorldBounds(true);
        this.player.body.setGravityY(1450);
        this.player.body.setMaxVelocity(280, 920);
        this.physics.add.collider(this.player, this.platforms);

        this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
        const zoom = Math.min(window.innerWidth / 760, window.innerHeight / 420);
        this.cameras.main.setZoom(Phaser.Math.Clamp(zoom, 1.0, 1.6));

        this.cursors = this.input.keyboard.createCursorKeys();
        this.keys = this.input.keyboard.addKeys("A,D,W,S,E");
        this.time.addEvent({
          delay: 1200,
          loop: true,
          callback: () => saveSceneState("tower", { x: this.player.x, y: this.player.y })
        });
      }

      makeZone(x, y, w, h) {
        const zone = this.add.zone(x, y, w, h);
        this.physics.world.enable(zone);
        zone.body.setAllowGravity(false);
        zone.body.moves = false;
        return zone;
      }

      useStair(targetX, targetY) {
        if (this.isTransitioning) return;
        this.isTransitioning = true;
        this.player.body.enable = false;
        this.tweens.add({
          targets: this.player,
          x: targetX,
          y: targetY,
          duration: 430,
          ease: "Sine.easeInOut",
          onComplete: () => {
            this.player.body.enable = true;
            this.player.body.setVelocity(0, 0);
            this.isTransitioning = false;
          }
        });
      }

      update() {
        if (!userReady) return;

        this.activePrompt = null;
        this.prompts.forEach((item) => {
          if (this.physics.overlap(this.player, item.zone)) this.activePrompt = item;
        });
        setActionHint(this.activePrompt ? this.activePrompt.label : "");

        if (this.isTransitioning) return;

        const left = this.cursors.left.isDown || this.keys.A.isDown || controlState.left;
        const right = this.cursors.right.isDown || this.keys.D.isDown || controlState.right;
        const up = this.cursors.up.isDown || this.keys.W.isDown || controlState.up;
        const down = this.cursors.down.isDown || this.keys.S.isDown || controlState.down;
        const actionPressed = this.keys.E.isDown || controlState.action;

        if (left) {
          this.player.setVelocityX(-235);
          this.player.setFlipX(true);
        } else if (right) {
          this.player.setVelocityX(235);
          this.player.setFlipX(false);
        } else {
          this.player.setVelocityX(0);
        }

        if (this.player.body.blocked.down) {
          this.player.setTexture(Math.abs(this.player.body.velocity.x) > 5 ? "hero-side-run" : "hero-side-idle");
        }

        if (this.activePrompt && !this.lastAction) {
          const isStair = this.activePrompt.label.includes("上到") || this.activePrompt.label.includes("回第一區") || this.activePrompt.label.includes("回第二區");
          if ((isStair && (up || down || actionPressed)) || (!isStair && actionPressed)) {
            this.activePrompt.action();
          }
        }

        this.lastAction = actionPressed || up || down;
      }
    }

    const game = new Phaser.Game({
      type: Phaser.AUTO,
      parent: "game-root",
      backgroundColor: "#a8e3ff",
      pixelArt: true,
      scale: { mode: Phaser.Scale.RESIZE, width: window.innerWidth, height: window.innerHeight },
      physics: { default: "arcade", arcade: { gravity: { y: 0 }, debug: false } },
      scene: [TowerScene]
    });

    window.addEventListener("resize", () => game.scale.resize(window.innerWidth, window.innerHeight));
  </script>
</body>
</html>
